	<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>EUBC Timing</title>
<style>
/* ============ EUBC design system — quiet macOS-style chrome ============ */
/* Corporate face: Swiss 721. Drop licensed woff2 files into a /fonts folder
   next to this file and uncomment to activate; Helvetica Neue is the native
   fallback on every Mac and is the same design lineage.
@font-face{font-family:'Swiss 721';src:url('fonts/Swiss721-Roman.woff2') format('woff2');font-weight:400}
@font-face{font-family:'Swiss 721';src:url('fonts/Swiss721-Medium.woff2') format('woff2');font-weight:500}
@font-face{font-family:'Swiss 721';src:url('fonts/Swiss721-Bold.woff2') format('woff2');font-weight:600}
*/
:root{
  --canvas:#f2f3f5;
  --panel:#ffffff;
  --hair:#dfe3e8;
  --hair-soft:#eceff2;
  --text:#1d2530;
  --sub:#66707c;
  --navy:#0E2841;
  --blade:#6bb7e0;
  --blade-deep:#1a6a9a;
  --blade-tint:#eef6fb;
  --green:#2fa35c;
  --green-deep:#1f7d44;
  --green-bg:#ecf8f0;
  --green-hair:#b9e2c6;
  --red:#d0453a;
  --red-bg:#fdf3f2;
  --red-hair:#eec4bf;
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
button,input,select{touch-action:manipulation;font-family:inherit}
html{background:var(--canvas)}
body{
  font-family:'Swiss 721','Helvetica Neue',Helvetica,Arial,sans-serif;
  background:var(--canvas);color:var(--text);
  font-size:13px;line-height:1.45;min-height:100vh;
  padding-bottom:calc(74px + env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:820px;margin:0 auto;padding:12px}

/* ============ header ============ */
header.bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--panel);border:1px solid var(--hair);border-radius:12px;
  padding:10px 14px;margin-bottom:12px;
  box-shadow:0 1px 2px rgba(16,24,40,.04);
}
.logo{height:30px;width:auto;display:block}
header.bar h1{font-size:1.02rem;font-weight:600;color:var(--navy);letter-spacing:-.01em}
header.bar h1 span{font-weight:500;color:var(--blade-deep)}
#masterClock{
  font-family:var(--mono);font-weight:600;font-variant-numeric:tabular-nums;
  font-size:1.1rem;letter-spacing:-.01em;color:var(--navy);margin-left:auto;
}
.pill{
  font-size:.68rem;font-weight:600;padding:3px 10px;border-radius:999px;
  border:1px solid var(--hair);background:var(--hair-soft);color:var(--sub);white-space:nowrap;
}
.pill.ok{color:var(--green-deep);border-color:var(--green-hair);background:var(--green-bg)}
.pill.warn{color:#9a6b12;border-color:#ecd9ae;background:#fbf4e3}
.pill.bad{color:var(--red);border-color:var(--red-hair);background:var(--red-bg)}

/* ============ nav — bottom bar on mobile, segmented on desktop ============ */
nav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  display:flex;justify-content:space-around;
  background:rgba(255,255,255,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--hair);
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
}
nav button{
  flex:1;max-width:104px;background:none;border:none;cursor:pointer;
  font-size:.72rem;font-weight:500;color:var(--sub);
  padding:8px 2px;border-radius:9px;transition:color .12s ease,background .12s ease;
}
nav button.active{color:var(--navy);font-weight:600;background:var(--hair-soft)}
nav button:active{opacity:.6}
@media(min-width:700px){
  body{padding-bottom:32px}
  nav{position:static;background:#e9ecef;border:none;border-radius:10px;
    display:inline-flex;justify-content:flex-start;padding:3px;margin-bottom:14px;backdrop-filter:none}
  nav button{flex:0 0 auto;max-width:none;font-size:.82rem;padding:7px 16px;border-radius:8px}
  nav button.active{background:#fff;box-shadow:0 1px 2px rgba(16,24,40,.1);border:1px solid var(--hair)}
}

/* ============ home screen ============ */
.home{display:flex;flex-direction:column;align-items:center;text-align:center;padding:28px 16px 20px}
.home img.crest{width:180px;max-width:52vw;height:auto;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(16,24,40,.12))}
.home .wordmark{font-size:1.5rem;font-weight:600;color:var(--navy);letter-spacing:-.01em;margin-bottom:2px}
.home .wordmark span{font-weight:500;color:var(--blade-deep)}
.home .tag{font-size:.85rem;color:var(--sub);margin-bottom:26px}
.home .actions{display:flex;flex-direction:column;gap:12px;width:100%;max-width:360px}
.homeBtn{
  display:flex;align-items:center;gap:14px;text-align:left;cursor:pointer;
  background:var(--panel);border:1px solid var(--hair);border-radius:14px;
  padding:18px 18px;box-shadow:0 1px 2px rgba(16,24,40,.04);
  transition:border-color .12s ease,transform .1s ease,box-shadow .12s ease;
}
.homeBtn:active{transform:scale(.985)}
.homeBtn.primary{background:var(--navy);border-color:var(--navy)}
.homeBtn .ic{
  flex:0 0 auto;width:42px;height:42px;border-radius:11px;display:grid;place-items:center;
  background:var(--blade-tint);color:var(--blade-deep);font-size:1.3rem;
}
.homeBtn.primary .ic{background:rgba(255,255,255,.14);color:#fff}
.homeBtn .tx{flex:1;min-width:0}
.homeBtn .tt{font-size:1rem;font-weight:600;color:var(--navy)}
.homeBtn.primary .tt{color:#fff}
.homeBtn .ds{font-size:.78rem;color:var(--sub);margin-top:1px}
.homeBtn.primary .ds{color:rgba(255,255,255,.72)}
.homeBtn .chev{color:var(--sub);font-size:1.1rem;flex:0 0 auto}
.homeBtn.primary .chev{color:rgba(255,255,255,.6)}
.home .resume{margin-top:22px;font-size:.82rem;color:var(--sub)}
.home .resume a{color:var(--blade-deep);font-weight:600;cursor:pointer;text-decoration:none}

/* ============ panels ============ */
.panel{
  background:var(--panel);border:1px solid var(--hair);border-radius:12px;
  padding:16px;margin-bottom:12px;box-shadow:0 1px 2px rgba(16,24,40,.04);
}
.panel h2{font-size:.95rem;font-weight:600;color:var(--navy);letter-spacing:-.01em;margin-bottom:10px}
.hint{font-size:.8rem;color:var(--sub);line-height:1.45}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
label.fld{display:flex;flex-direction:column;gap:4px;font-size:.72rem;font-weight:500;color:var(--sub)}
input,select{
  font-size:.95rem;color:var(--text);background:#fff;
  border:1px solid var(--hair);border-radius:8px;padding:9px 10px;outline:none;min-width:0;
}
input:focus,select:focus{border-color:var(--blade);box-shadow:0 0 0 3px rgba(107,183,224,.18)}
input[type=number]{width:104px}

.btn{
  font-weight:600;font-size:.85rem;cursor:pointer;
  border:1px solid var(--navy);border-radius:9px;padding:10px 16px;
  color:#fff;background:var(--navy);transition:opacity .12s ease,transform .1s ease;
}
.btn:active{transform:scale(.97);opacity:.9}
.btn.ghost{background:#fff;color:var(--text);border-color:var(--hair)}
.btn.danger{background:#fff;color:var(--red);border-color:var(--red-hair)}
.btn.small{padding:7px 12px;font-size:.78rem;border-radius:8px}

/* segmented control */
.seg{display:inline-flex;background:#e9ecef;border-radius:9px;padding:2px}
.seg button{border:none;background:none;cursor:pointer;font-size:.8rem;font-weight:500;color:var(--sub);padding:6px 14px;border-radius:7px}
.seg button.on{background:#fff;color:var(--navy);font-weight:600;box-shadow:0 1px 2px rgba(16,24,40,.1)}
.chip{font-size:.78rem;font-weight:500;padding:6px 12px;border-radius:999px;background:#fff;border:1px solid var(--hair);color:var(--sub);cursor:pointer}
.chip.on{background:var(--blade-tint);color:var(--blade-deep);border-color:var(--blade);font-weight:600}

/* ============ boat cards (setup) ============ */
.boatCard{background:#fff;border:1px solid var(--hair);border-radius:10px;padding:12px;margin-bottom:10px}
.boatCard .head{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px}
.crewGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px}

/* ============ timing buttons ============ */
.stampBtn{
  width:100%;display:flex;align-items:center;gap:12px;text-align:left;
  border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;min-height:74px;
  border:1px solid var(--red-hair);background:var(--red-bg);color:var(--text);
  position:relative;overflow:hidden;
  transition:background .15s ease,border-color .15s ease;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
}
.stampBtn .ident{
  font-family:var(--mono);font-weight:600;font-size:1.3rem;min-width:52px;color:var(--red);
  font-variant-numeric:tabular-nums;
}
.stampBtn .meta{flex:1;min-width:0}
.stampBtn .cat{font-weight:600;font-size:.9rem;color:var(--navy)}
.stampBtn .crew{font-size:.74rem;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stampBtn .time{font-family:var(--mono);font-weight:600;font-size:1.05rem;font-variant-numeric:tabular-nums;color:var(--red);text-align:right;line-height:1.25}
.stampBtn .sub{display:block;font-family:'Swiss 721','Helvetica Neue',Helvetica,sans-serif;font-size:.62rem;font-weight:500;color:var(--sub);margin-top:2px}
.stampBtn:active{transform:scale(.99)}
.stampBtn.done{border-color:var(--green-hair);background:var(--green-bg)}
.stampBtn.done .ident{color:var(--green-deep)}
.stampBtn.done .time{color:var(--green-deep)}
.stampBtn.waiting{opacity:.5;pointer-events:none;border-color:var(--hair);background:#fff}
.stampBtn.running{border-color:var(--green-hair);background:var(--green-bg)}
.stampBtn.running .ident{color:var(--green-deep)}
.stampBtn.running .time{color:var(--green-deep)}
.runTag{display:inline-flex;align-items:center;gap:5px;font-family:'Swiss 721','Helvetica Neue',Helvetica,sans-serif;font-size:.6rem;font-weight:600;color:var(--green-deep);letter-spacing:.02em}
.laneChip{display:inline-block;font-size:.62rem;font-weight:600;color:var(--blade-deep);background:var(--blade-tint);border:1px solid var(--blade);border-radius:5px;padding:1px 5px;margin-right:6px;vertical-align:1px}
.runDot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:runPulse 1.1s ease-in-out infinite}
@keyframes runPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
.stampBtn.flash{animation:stampFlash .5s ease-out}
@keyframes stampFlash{
  0%{background:#8fe0ac;border-color:var(--green);transform:scale(1.015)}
  100%{background:var(--green-bg);border-color:var(--green-hair);transform:scale(1)}
}
.stampBtn.holding{animation:holdShrink .6s ease-in forwards}
@keyframes holdShrink{0%{transform:scale(1)}100%{transform:scale(.965);background:var(--red-bg);border-color:var(--red)}}
.massBtn{
  width:100%;padding:26px 20px;border-radius:14px;margin-bottom:12px;cursor:pointer;
  border:1px solid var(--red-hair);background:var(--red-bg);color:var(--red);
  font-weight:600;font-size:1.25rem;position:relative;overflow:hidden;
  transition:background .15s ease,border-color .15s ease;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
}
.massBtn .sub{display:block;font-size:.68rem;font-weight:500;color:var(--sub);margin-top:4px}
.massBtn.done{border-color:var(--green-hair);background:var(--green-bg);color:var(--green-deep);font-size:1.05rem}
.massBtn.flash{animation:stampFlash .5s ease-out}
.massBtn.holding{animation:holdShrink .6s ease-in forwards}
.massBtn:active{transform:scale(.99)}

/* ============ close finish / misaligned start ============ */
.captureBtn{
  width:100%;padding:34px 20px;border-radius:14px;margin:10px 0 12px;cursor:pointer;
  border:1.5px solid var(--red-hair);background:var(--red-bg);color:var(--red);
  font-weight:600;font-size:1.35rem;position:relative;overflow:hidden;
  transition:background .15s ease;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
}
.captureBtn .sub{display:block;font-size:.68rem;font-weight:500;color:var(--sub);margin-top:4px}
.captureBtn.flash{animation:stampFlash .5s ease-out}
.captureBtn:active{transform:scale(.99)}
.rawBox{background:#fff;border:1px solid var(--hair);border-radius:12px;padding:12px;margin-bottom:12px}
.rawBox h3{font-size:.8rem;font-weight:600;color:var(--navy);margin-bottom:8px}
.rawRow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 0;border-bottom:1px solid var(--hair-soft)}
.rawRow:last-child{border-bottom:none}
.rawT{font-family:var(--mono);font-weight:600;font-size:.86rem;color:var(--navy);min-width:118px}
.rawN{font-size:.68rem;font-weight:600;color:var(--sub);min-width:22px}
.bowChip{font-family:var(--mono);font-size:.85rem;font-weight:600;padding:7px 12px;border-radius:8px;background:var(--blade-tint);border:1px solid var(--blade);color:var(--blade-deep);cursor:pointer}
.bowChip:active{transform:scale(.95)}
.rawDel{margin-left:auto;background:#fff;border:1px solid var(--red-hair);color:var(--red);border-radius:8px;font-size:.72rem;font-weight:600;padding:6px 10px;cursor:pointer}

/* ============ results ============ */
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{font-weight:600;font-size:.7rem;color:var(--sub);text-align:left;padding:8px 6px;border-bottom:1px solid var(--hair)}
td{padding:9px 6px;border-bottom:1px solid var(--hair-soft);vertical-align:top}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
td.num{font-family:var(--mono);font-size:.83rem}
tr.rank1 td:first-child{color:#b3830a;font-weight:700}
tr.rank2 td:first-child{color:#7d8894;font-weight:700}
tr.rank3 td:first-child{color:#a5643a;font-weight:700}
.crewSmall{font-size:.72rem;color:var(--sub)}
.bigPct{font-family:var(--mono);font-weight:600;color:var(--blade-deep)}

/* ============ pieces & settings ============ */
.pieceRow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:11px 2px;border-bottom:1px solid var(--hair-soft)}
.pieceRow .nm{font-weight:600;color:var(--navy)}
.pieceRow .sub{font-size:.75rem;color:var(--sub)}
.gmtGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:10px}
.gmtGrid label.fld input{width:100%;font-family:var(--mono);font-size:.88rem}

/* ============ testing (seat racing & matrices) ============ */
.roundHead{font-size:.7rem;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 2px}
.tRace{padding:10px 2px;border-bottom:1px solid var(--hair-soft)}
.tRace:last-child{border-bottom:none}
.tRace .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tRace .nm{font-weight:600;color:var(--navy);font-size:.86rem}
.tRace .lu{font-size:.74rem;color:var(--sub);margin-top:3px;line-height:1.5}
.tRace .actions{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.athChip{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;font-weight:500;padding:7px 12px;border-radius:999px;background:#fff;border:1px solid var(--hair);color:var(--text);cursor:pointer;margin:0 6px 6px 0}
.athChip .st{font-size:.58rem;font-weight:700;padding:1px 5px;border-radius:4px;background:var(--blade-tint);color:var(--blade-deep);border:1px solid var(--blade)}
.athChip .st.b{background:#f3eefc;color:#6b4fa1;border-color:#cdbbe9}
.athChip.sel{background:var(--navy);color:#fff;border-color:var(--navy)}
.athChip.used{opacity:.35;pointer-events:none}
.swapLine{display:flex;align-items:center;gap:8px;font-size:.82rem;padding:8px 0;border-bottom:1px solid var(--hair-soft);flex-wrap:wrap}
.swapLine .arr{font-family:var(--mono);color:var(--blade-deep);font-weight:700}
.tBoatBox{background:#fff;border:1px solid var(--hair);border-radius:10px;padding:11px;margin-bottom:9px}
.tBoatBox h4{font-size:.72rem;font-weight:600;color:var(--sub);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.sideBtn{font-size:.62rem;font-weight:600;margin-top:3px;padding:3px 8px;border-radius:5px;cursor:pointer;border:1px solid var(--blade);background:var(--blade-tint);color:var(--blade-deep)}
.sideBtn.b{border-color:#cdbbe9;background:#f3eefc;color:#6b4fa1}
textarea.names{width:100%;min-height:96px;font-size:.92rem;color:var(--text);border:1px solid var(--hair);border-radius:8px;padding:9px 10px;font-family:inherit;resize:vertical;background:#fff}
textarea.names:focus{outline:none;border-color:var(--blade);box-shadow:0 0 0 3px rgba(107,183,224,.18)}
.netPos{color:var(--green-deep);font-weight:600}
.netNeg{color:var(--red);font-weight:600}

.toastWrap{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:99;display:flex;flex-direction:column;gap:8px;align-items:center;width:max-content;max-width:92vw}
@media(min-width:700px){.toastWrap{bottom:24px}}
.toast{
  background:var(--navy);color:#fff;padding:9px 18px;border-radius:999px;
  font-size:.82rem;font-weight:500;box-shadow:0 4px 16px rgba(14,40,65,.3);
  animation:fadeUp .22s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hidden{display:none!important}
body.viewonly{padding-bottom:20px}
body.viewonly nav, body.viewonly #viewSetup, body.viewonly #viewStart, body.viewonly #viewFinish, body.viewonly #viewPieces, body.viewonly #viewTesting, body.viewonly #viewSettings, body.viewonly .editOnly{display:none!important}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media(max-width:420px){
  nav button{font-size:.65rem;padding:8px 1px}
  header.bar{padding:9px 12px}
  header.bar h1{font-size:.92rem}
  #masterClock{font-size:.98rem}
  .logo{height:26px}
  .panel{padding:13px}
  .stampBtn .ident{font-size:1.15rem;min-width:44px}
  .stampBtn .time{font-size:.95rem}
  th,td{padding-left:4px;padding-right:4px}
}
</style>

<body>
<div class="wrap">

<header class="bar">
  <img src="eubc-logo.png" class="logo" alt="EUBC" onerror="this.style.display='none'" onclick="showView('Home')" style="cursor:pointer">
  <h1 onclick="showView('Home')" style="cursor:pointer">EUBC <span>Timing</span></h1>
  <span id="syncPill" class="pill warn">Connecting…</span>
  <div id="masterClock">--:--:--</div>
</header>

<nav id="nav">
  <button data-v="Setup">Setup</button>
  <button data-v="Start">Start</button>
  <button data-v="Finish">Finish</button>
  <button data-v="Results">Results</button>
  <button data-v="Pieces">Pieces</button>
  <button data-v="Testing">Testing</button>
  <button data-v="Settings">Settings</button>
</nav>

<div id="viewHome" class="view hidden"></div>
<div id="viewSetup" class="view"></div>
<div id="viewStart" class="view hidden"></div>
<div id="viewFinish" class="view hidden"></div>
<div id="viewResults" class="view hidden"></div>
<div id="viewPieces" class="view hidden"></div>
<div id="viewTesting" class="view hidden"></div>
<div id="viewSettings" class="view hidden"></div>

</div>
<div class="toastWrap" id="toasts"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script>
/* =====================================================
   EUBC Timing — core: firebase, clock sync, offline queue
   ===================================================== */
const NODE = 'eubc-timing-v1';
/* Guarded init: if the Firebase SDK fails to load (opened with no signal),
   the app still runs fully from localStorage and syncs when it next loads online. */
let rtdb=null, root=null;
try{
  firebase.initializeApp({ databaseURL:'https://racetimer-40043-default-rtdb.europe-west1.firebasedatabase.app' });
  rtdb = firebase.database();
  root = rtdb.ref(NODE);
}catch(e){ console.warn('Firebase unavailable — running offline', e); }

const CATS = ['M1x','F1x','M2-','F2-','M2x','F2x','M4-','F4-','M4x','F4x','M4+','F4+','M8+','F8+'];
/* Inventory boat types — a loose reference label for each hull, so a boat can
   be identified on the water. This does NOT constrain the racing category,
   which is chosen independently in setup and is what drives GMT. */
const BOAT_TYPES = [
  {t:'1x', label:'1x'},
  {t:'2', label:'2x/-'},
  {t:'4', label:'4x/-'},
  {t:'4+', label:'4+'},
  {t:'8+', label:'8+'}
];
function typeLabel(t){ const b=BOAT_TYPES.find(x=>x.t===t); return b?b.label:t; }
const DEFAULT_GMTS = { // 2k Gold Medal Times in seconds (editable in Settings)
  'M1x':390.74,'F1x':427.71,'M2-':368.50,'F2-':407.41,'M2x':359.72,'F2x':397.31,
  'M4-':337.86,'F4-':374.36,'M4x':332.26,'F4x':366.84,'M4+':358.96,'F4+':393.38,
  'M8+':318.68,'F8+':352.99
};
function catLabel(c){ return (c[0]==='M'?'Male ':'Female ')+c.slice(1); }
function positionsFor(c){
  const s=c.slice(1);
  if(s==='1x') return ['Sculler'];
  if(s==='2-'||s==='2x') return ['Stroke','Bow'];
  if(s==='4-'||s==='4x') return ['Stroke','3','2','Bow'];
  if(s==='4+') return ['Stroke','3','2','Bow','Cox'];
  return ['Cox','Stroke','7','6','5','4','3','2','Bow']; // 8+
}
function inventory(){ return (db.settings && db.settings.boats) || {}; }

/* ---------- local mirror + persistence ---------- */
const LS = { db:'eubcTimer.db', queue:'eubcTimer.queue', offset:'eubcTimer.offset', sort:'eubcTimer.sort' };
let db = { settings:{ gmts:{...DEFAULT_GMTS} }, activePieceId:null, pieces:{} };
try{ const c=JSON.parse(localStorage.getItem(LS.db)); if(c) db=Object.assign(db,c); }catch(e){}
if(!db.settings) db.settings={gmts:{...DEFAULT_GMTS}};
if(!db.settings.gmts) db.settings.gmts={...DEFAULT_GMTS};

let queue = [];
try{ queue = JSON.parse(localStorage.getItem(LS.queue)) || []; }catch(e){}

function persistDb(){ try{ localStorage.setItem(LS.db, JSON.stringify(db)); }catch(e){} }
function persistQueue(){ try{ localStorage.setItem(LS.queue, JSON.stringify(queue)); }catch(e){} }

function applyPath(obj, path, val){
  const segs = path.split('/');
  let o = obj;
  for(let i=0;i<segs.length-1;i++){
    if(typeof o[segs[i]]!=='object' || o[segs[i]]===null) o[segs[i]]={};
    o=o[segs[i]];
  }
  const last = segs[segs.length-1];
  if(val===null) delete o[last]; else o[last]=val;
}

/* every write: local first, then queue -> firebase */
function fbSet(path, val){
  applyPath(db, path, val);
  persistDb();
  queue.push({ path, val });
  persistQueue();
  flushQueue();
  updateSyncPill();
  renderCurrent();
}

let connected=false, flushing=false;
function flushQueue(){
  if(!root || !connected || flushing || !queue.length) return;
  flushing=true;
  const op = queue[0];
  root.child(op.path).set(op.val===undefined?null:op.val)
    .then(()=>{ queue.shift(); persistQueue(); flushing=false; updateSyncPill(); flushQueue(); })
    .catch(()=>{ flushing=false; updateSyncPill(); });
}

/* ---------- server clock sync ---------- */
let serverOffset = Number(localStorage.getItem(LS.offset)) || 0;
if(rtdb) rtdb.ref('.info/serverTimeOffset').on('value', s=>{
  const v = s.val();
  if(typeof v==='number'){ serverOffset=v; localStorage.setItem(LS.offset,String(v)); updateSyncPill(); }
});
if(rtdb) rtdb.ref('.info/connected').on('value', s=>{
  connected = s.val()===true;
  updateSyncPill();
  if(connected) flushQueue();
});
function nowMs(){ return Date.now() + serverOffset; }

function updateSyncPill(){
  const p = document.getElementById('syncPill');
  if(connected && !queue.length){ p.className='pill ok'; p.textContent='Live · synced'; }
  else if(connected){ p.className='pill warn'; p.textContent='Syncing · '+queue.length+' pending'; }
  else { p.className='pill bad'; p.textContent='Offline · '+queue.length+' queued'; }
}

/* ---------- remote listeners (remote wins, then replay pending ops) ---------- */
function overlayQueue(prefix){
  queue.forEach(op=>{ if(op.path===prefix || op.path.startsWith(prefix+'/') ) applyPath(db, op.path, op.val); });
}
if(root) root.child('settings/gmts').on('value', s=>{
  const v=s.val();
  if(v){ db.settings.gmts = Object.assign({...DEFAULT_GMTS}, v); overlayQueue('settings/gmts'); persistDb(); renderCurrent(); }
});
if(root) root.child('settings/boats').on('value', s=>{
  const v=s.val();
  db.settings.boats = v || {}; overlayQueue('settings/boats'); persistDb(); renderCurrent();
});
let pieceSub=null;
if(root) root.child('activePieceId').on('value', s=>{
  const id=s.val();
  if(id) { db.activePieceId=id; }
  overlayQueue('activePieceId');
  persistDb();
  subscribeActivePiece();
  renderCurrent();
});
function subscribeActivePiece(){
  if(!root) return;
  const id = db.activePieceId;
  if(pieceSub){ pieceSub.ref.off('value', pieceSub.fn); pieceSub=null; }
  if(!id) return;
  const ref = root.child('pieces/'+id);
  const fn = s=>{
    const v=s.val();
    if(v){ db.pieces[id]=v; overlayQueue('pieces/'+id); persistDb(); renderCurrent(); }
  };
  ref.on('value', fn);
  pieceSub={ref,fn};
}

/* ---------- audio: stopwatch beep, zero-lag ---------- */
let audioCtx=null;
function initAudio(){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});
    if(audioCtx.state==='suspended') audioCtx.resume();
  }catch(e){}
}
document.addEventListener('pointerdown', initAudio, {once:false, passive:true});
function beep(freq, dur, vol){
  try{
    if(!audioCtx) initAudio();
    if(!audioCtx) return;
    const t0=audioCtx.currentTime;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='square';
    o.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(vol, t0);
    g.gain.setValueAtTime(vol, t0+dur*0.7);
    g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t0); o.stop(t0+dur);
  }catch(e){}
}
function stampBeep(){ beep(1760, 0.08, 0.14); }   // sharp stopwatch blip
function clearBeep(){ beep(520, 0.1, 0.1); }      // low blip on clear
function buzz(ms){ if(navigator.vibrate) try{navigator.vibrate(ms);}catch(e){} }

/* ---------- helpers ---------- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtElapsed(ms){
  if(ms==null || isNaN(ms) || ms<0) return '—';
  const h = Math.round(ms/10);
  const m = Math.floor(h/6000), s = Math.floor((h%6000)/100), c = h%100;
  return m+':'+String(s).padStart(2,'0')+'.'+String(c).padStart(2,'0');
}
function splitPer500(ms, distance){
  if(ms==null || isNaN(ms) || ms<=0 || !distance) return '—';
  return fmtElapsed(ms / (distance/500));
}
function fmtGmtSec(sec){
  if(sec==null||isNaN(sec)) return '';
  const h=Math.round(sec*100);
  const m=Math.floor(h/6000), s=Math.floor((h%6000)/100), c=h%100;
  return m+':'+String(s).padStart(2,'0')+'.'+String(c).padStart(2,'0');
}
function parseTimeStr(str){
  if(!str) return null;
  const m = String(str).trim().match(/^(\d+):([0-5]?\d)(?:\.(\d{1,2}))?$/);
  if(!m) return null;
  return parseInt(m[1],10)*60 + parseInt(m[2],10) + (m[3]? parseInt(m[3].padEnd(2,'0'),10)/100 : 0);
}
function fmtWallClock(ms){
  const d = new Date(ms);
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')+'.'+Math.floor(d.getMilliseconds()/100);
}
function toast(msg){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}
function activePiece(){ return db.activePieceId ? db.pieces[db.activePieceId] : null; }
function boatsInOrder(piece){
  if(!piece||!piece.boats) return [];
  const order = piece.order || Object.keys(piece.boats);
  return order.filter(id=>piece.boats[id]).map(id=>({id, ...piece.boats[id]}));
}
function crewText(b){
  const pos = positionsFor(b.category||'M1x');
  const crew = b.crew||{};
  return pos.map((p,i)=>{ const n=(crew[i]||'').trim(); return n? (pos.length>1? p+': '+n : n) : null; }).filter(Boolean).join(' · ');
}
function laneBadge(b){ return b.lane? `<span class="laneChip">Lane ${b.lane}</span>` : ''; }
function catLine(b){ return `${laneBadge(b)}${catLabel(b.category)}`; }
function scaledGmtMs(cat, distance){
  const g = (db.settings.gmts||{})[cat];
  if(!g || !distance) return null;
  return g*1000 * (distance/2000);
}
function gmtPct(b, piece){
  if(b.startTs==null||b.finishTs==null) return null;
  const el = b.finishTs-b.startTs;
  const g = scaledGmtMs(b.category, piece.distance);
  if(!g || el<=0) return null;
  return g/el*100;
}

/* master clock */
setInterval(()=>{ document.getElementById('masterClock').textContent = fmtWallClock(nowMs()); }, 90);
</script>
<script>
/* =====================================================
   Testing — seat racing, pairs matrix, doubles matrix
   Sessions plan the races; every race is timed as a
   normal piece (tagged with sessionId), so the Start /
   Finish / Results engine is reused unchanged.
   ===================================================== */
if(!db.sessions) db.sessions={};
let tst={ screen:'hub', openId:null, draft:null, staged:[], pick:null };
let _tstPieceFetch=0;

/* live mirror of sessions (they're small — schedule + names only) */
if(root) root.child('sessions').on('value', s=>{
  db.sessions = s.val()||{};
  overlayQueue('sessions'); persistDb();
  if(currentView==='Testing') renderTesting();
});

/* fetch recent pieces so race status / rankings are fresh (throttled) */
function tstFetchPieces(){
  if(!root || Date.now()-_tstPieceFetch<5000) return;
  _tstPieceFetch=Date.now();
  root.child('pieces').orderByChild('createdAt').limitToLast(200).once('value').then(s=>{
    const v=s.val()||{};
    Object.keys(v).forEach(k=>{ db.pieces[k]=Object.assign(db.pieces[k]||{}, v[k]); });
    overlayQueue('pieces'); persistDb();
    if(currentView==='Testing') renderTesting();
  }).catch(()=>{});
}

const TYPE_LABEL={seat:'Seat race',pairs:'Pairs matrix',doubles:'Doubles matrix'};
function sideName(s){ return s==='S'?'Stroke side':'Bow side'; }
function fmtSecs(ms){ return (ms/1000).toFixed(2)+'s'; }
function fmtNet(ms){ return (ms>=0?'+':'−')+(Math.abs(ms)/1000).toFixed(2)+'s'; }

/* ---------- helpers ---------- */
function tstParseNames(txt){
  const seen={}, out=[];
  String(txt||'').split(/\n|,/).map(x=>x.trim()).filter(Boolean).forEach(n=>{
    const k=n.toLowerCase(); if(!seen[k]){ seen[k]=1; out.push(n); }
  });
  return out;
}
function chunkArr(arr,n){ const out=[]; for(let i=0;i<arr.length;i+=Math.max(1,n)) out.push(arr.slice(i,i+Math.max(1,n))); return out; }

/* ---------- schedule generators ---------- */
/* Pairs matrix: strokesiders fixed, bowsiders rotate one place per round,
   so every strokesider meets every bowsider exactly once across the full
   rotation. Uneven lists pad with rests. Rounds split into flights when
   there are more pairs than boats. */
function genPairsSchedule(stroke,bow,maxBoats){
  const n=Math.max(stroke.length,bow.length);
  const races={}, order=[];
  for(let r=0;r<n;r++){
    const pairs=[];
    for(let i=0;i<n;i++){
      const s=stroke[i], b=bow[(i+r)%n];
      if(s&&b) pairs.push({stroke:s,bow:b});
    }
    chunkArr(pairs,maxBoats).forEach((fl,fi,all)=>{
      const rid='r'+r+'f'+fi;
      races[rid]={ label:'Round '+(r+1)+(all.length>1?' · Flight '+(fi+1):''), round:r+1, boats:fl, pieceId:null };
      order.push(rid);
    });
  }
  return {races,order,rounds:n};
}

/* Doubles matrix: circle-method round robin so every athlete rows with
   every other exactly once. perm=true appends a mirrored second pass
   with seat order flipped. */
function genDoublesSchedule(names,maxBoats,perm){
  const arr=[...names]; if(arr.length%2) arr.push(null);
  const n=arr.length, base=[];
  for(let r=0;r<n-1;r++){
    const rd=[];
    for(let i=0;i<n/2;i++){
      const a=arr[i], b=arr[n-1-i];
      if(a&&b) rd.push({stroke:a,bow:b});
    }
    base.push(rd);
    arr.splice(1,0,arr.pop());
  }
  const races={}, order=[];
  let roundNum=0;
  for(let p=0;p<(perm?2:1);p++){
    base.forEach((rd,ri)=>{
      roundNum++;
      const pairs = p===0? rd : rd.map(x=>({stroke:x.bow,bow:x.stroke}));
      chunkArr(pairs,maxBoats).forEach((fl,fi,all)=>{
        const rid='p'+p+'r'+ri+'f'+fi;
        races[rid]={ label:'Round '+roundNum+(all.length>1?' · Flight '+(fi+1):'')+(p===1?' · seats swapped':''), round:roundNum, boats:fl, pieceId:null };
        order.push(rid);
      });
    });
  }
  return {races,order,rounds:roundNum};
}

/* ---------- drafts ---------- */
function tstEmptyFour(){
  return {seats:[{pos:'Stroke',name:'',side:'S'},{pos:'3',name:'',side:'B'},{pos:'2',name:'',side:'S'},{pos:'Bow',name:'',side:'B'}],cox:''};
}
function tstStart(type){
  tst.staged=[]; tst.pick=null; tst.openId=null;
  if(type==='seat') tst.draft={type:'seat',name:'',sex:'M',distance:1000,startMode:'mass',boatClass:'4+',nBoats:2,boats:[tstEmptyFour(),tstEmptyFour()]};
  else if(type==='pairs') tst.draft={type:'pairs',name:'',sex:'M',distance:1000,startMode:'mass',maxBoats:2,stroke:'',bow:''};
  else tst.draft={type:'doubles',name:'',sex:'M',distance:1000,startMode:'mass',maxBoats:2,all:'',permMode:'combo'};
  tst.screen='new';
  renderTesting();
}
function tstSetBoats(n){
  const d=tst.draft;
  n=Math.max(2,Math.min(4,n));
  while(d.boats.length<n) d.boats.push(tstEmptyFour());
  d.boats.length=n; d.nBoats=n;
  renderTesting();
}
function tstToggleSide(i,j){
  const s=tst.draft.boats[i].seats[j];
  s.side = s.side==='S'?'B':'S';
  renderTesting();
}
function tstBack(){ tst.screen='hub'; tst.openId=null; tst.draft=null; tst.staged=[]; tst.pick=null; renderTesting(); }
function tstOpen(sid){ tst.screen='session'; tst.openId=sid; tst.staged=[]; tst.pick=null; _tstPieceFetch=0; renderTesting(); }

/* ---------- create sessions ---------- */
function tstCreateSession(){
  const d=tst.draft; if(!d) return;
  if(!d.distance){ toast('Set a distance'); return; }
  const sid='s'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  let sess=null;
  if(d.type==='seat'){
    for(const b of d.boats){
      if(b.seats.some(x=>!x.name.trim())){ toast('Name every rower in every boat'); return; }
      if(d.boatClass==='4+' && !String(b.cox||'').trim()){ toast('Name every cox (or switch to 4−)'); return; }
    }
    const boats=d.boats.map(b=>({
      seats:b.seats.map(x=>({pos:x.pos,name:x.name.trim(),side:x.side})),
      cox: d.boatClass==='4+'? String(b.cox||'').trim() : ''
    }));
    sess={ type:'seat', name:d.name.trim()||('Seat racing '+new Date().toLocaleDateString('en-GB')),
      createdAt:nowMs(), sex:d.sex, distance:d.distance, startMode:d.startMode, boatClass:d.boatClass,
      races:{ r1:{label:'Race 1',round:1,boats,pieceId:null,baseRaceId:null,swaps:[]} }, raceOrder:['r1'] };
  } else if(d.type==='pairs'){
    const S=tstParseNames(d.stroke), B=tstParseNames(d.bow);
    if(S.length<2||B.length<2){ toast('Enter at least 2 names per side'); return; }
    const g=genPairsSchedule(S,B,d.maxBoats);
    sess={ type:'pairs', name:d.name.trim()||('Pairs matrix '+new Date().toLocaleDateString('en-GB')),
      createdAt:nowMs(), sex:d.sex, distance:d.distance, startMode:d.startMode,
      athletes:{stroke:S,bow:B}, races:g.races, raceOrder:g.order };
  } else {
    const A=tstParseNames(d.all);
    if(A.length<3){ toast('Enter at least 3 scullers'); return; }
    const g=genDoublesSchedule(A,d.maxBoats,d.permMode==='perm');
    sess={ type:'doubles', name:d.name.trim()||('Doubles matrix '+new Date().toLocaleDateString('en-GB')),
      createdAt:nowMs(), sex:d.sex, distance:d.distance, startMode:d.startMode, permMode:d.permMode,
      athletes:{all:A}, races:g.races, raceOrder:g.order };
  }
  fbSet('sessions/'+sid, sess);
  toast(TYPE_LABEL[sess.type]+' created — '+sess.raceOrder.length+' race'+(sess.raceOrder.length===1?'':'s')+' planned');
  tstOpen(sid);
}
function tstDeleteSession(sid){
  const s=db.sessions[sid]; if(!s) return;
  if(!confirm('Delete this testing session? Timed pieces stay in Pieces — only the session plan and rankings are removed.')) return;
  fbSet('sessions/'+sid, null);
  tstBack();
  toast('Session deleted');
}

/* ---------- run a race (creates / activates its piece) ---------- */
function tstRunRace(sid,rid){
  const s=db.sessions[sid]; if(!s) return;
  const r=(s.races||{})[rid]; if(!r) return;
  if(r.pieceId && db.pieces[r.pieceId]){
    fbSet('activePieceId', r.pieceId); subscribeActivePiece(); showView('Start'); return;
  }
  const cat = s.sex + (s.type==='seat'? s.boatClass : s.type==='pairs'? '2-':'2x');
  const boats={}, order=[];
  (r.boats||[]).forEach((L,i)=>{
    const bid='b'+i+'_'+Math.random().toString(36).slice(2,7);
    const crew={};
    if(s.type==='seat'){
      (L.seats||[]).forEach((seat,j)=>{ if(seat&&seat.name) crew[j]=seat.name; });
      if(L.cox) crew[4]=L.cox;
    } else { crew[0]=L.stroke; crew[1]=L.bow; }
    boats[bid]={ ident:String(i+1), category:cat, crew, lane:(i+1<=8? i+1 : 0), invId:null, startTs:null, finishTs:null };
    order.push(bid);
  });
  const pid='p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  fbSet('pieces/'+pid, { name:(s.name||'Testing')+' — '+r.label, distance:s.distance,
    startMode:s.startMode||'mass', createdAt:nowMs(), boats, order, sessionId:sid, raceId:rid });
  fbSet('sessions/'+sid+'/races/'+rid+'/pieceId', pid);
  fbSet('activePieceId', pid); subscribeActivePiece();
  toast(r.label+' ready to time');
  showView('Start');
}

/* ---------- race results / status ---------- */
function tstRaceResults(r){
  const p=r&&r.pieceId? db.pieces[r.pieceId]:null;
  if(!p) return null;
  return boatsInOrder(p).map((b,i)=>({idx:i, ident:b.ident,
    elapsed:(b.startTs!=null&&b.finishTs!=null)?(b.finishTs-b.startTs):null }));
}
function tstStatus(r){
  const p=r&&r.pieceId? db.pieces[r.pieceId]:null;
  if(!p) return {pill:'', label:'Planned', create:true};
  const st=pieceStatus(p);
  if(st.label==='Not run yet') return {pill:'<span class="pill">Ready</span>', ready:true};
  if(st.complete) return {pill:'<span class="pill ok">Complete</span>', results:true};
  return {pill:'<span class="pill warn">In progress</span>', open:true};
}

/* ---------- seat race: swap staging ---------- */
function tstPickRower(i,j){
  const sid=tst.openId, s=db.sessions[sid]; if(!s) return;
  const base=s.races[s.raceOrder[s.raceOrder.length-1]];
  const seat=base.boats[i].seats[j];
  if(tst.pick && tst.pick.i===i && tst.pick.j===j){ tst.pick=null; renderTesting(); return; }
  if(!tst.pick){ tst.pick={i,j,side:seat.side}; renderTesting(); return; }
  if(tst.pick.i===i){ toast('Pick a rower in a different boat'); return; }
  if(tst.pick.side!==seat.side){ toast('Swaps must be same side — '+sideName(tst.pick.side)+' selected'); return; }
  tst.staged.push({i:tst.pick.i, si:tst.pick.j, j:i, sj:j});
  tst.pick=null;
  renderTesting();
}
function tstUnstage(k){ tst.staged.splice(k,1); renderTesting(); }
function tstSeatUsed(i,j){
  return tst.staged.some(sw=>(sw.i===i&&sw.si===j)||(sw.j===i&&sw.sj===j));
}
function tstCreateSwapRace(){
  const sid=tst.openId, s=db.sessions[sid]; if(!s) return;
  if(!tst.staged.length){ toast('Stage at least one swap first'); return; }
  const baseId=s.raceOrder[s.raceOrder.length-1];
  const base=s.races[baseId];
  const boats=JSON.parse(JSON.stringify(base.boats));
  const swaps=tst.staged.map(sw=>({
    iBoat:sw.i, jBoat:sw.j,
    aName:base.boats[sw.i].seats[sw.si].name,
    bName:base.boats[sw.j].seats[sw.sj].name,
    side:base.boats[sw.i].seats[sw.si].side
  }));
  tst.staged.forEach(sw=>{
    const A=boats[sw.i].seats[sw.si], B=boats[sw.j].seats[sw.sj];
    const t=A.name; A.name=B.name; B.name=t;
  });
  const n=s.raceOrder.length+1;
  const rid='r'+n+'_'+Math.random().toString(36).slice(2,5);
  fbSet('sessions/'+sid+'/races/'+rid, {label:'Race '+n, round:n, boats, pieceId:null, baseRaceId:baseId, swaps});
  fbSet('sessions/'+sid+'/raceOrder', [...s.raceOrder, rid]);
  tst.staged=[]; tst.pick=null;
  toast('Race '+n+' created — run it from the schedule');
}

/* ---------- analysis: seat race ---------- */
/* For each swap race, compare the margin between the two boats involved
   before (base race) and after. The swing is credited head-to-head to the
   swapped rowers. Races where both sides swapped between the same two
   boats are shown but excluded from the individual net ranking, since the
   swing can't be attributed to one rower. */
function tstSeatAnalysis(s){
  const events=[];
  (s.raceOrder||[]).forEach(rid=>{
    const r=s.races[rid];
    if(!r || !r.baseRaceId || !r.swaps || !r.swaps.length) return;
    const base=s.races[r.baseRaceId]; if(!base) return;
    const cur=tstRaceResults(r), prev=tstRaceResults(base);
    if(!cur||!prev) return;
    const groups={};
    r.swaps.forEach(sw=>{
      const key=Math.min(sw.iBoat,sw.jBoat)+'v'+Math.max(sw.iBoat,sw.jBoat);
      (groups[key]=groups[key]||[]).push(sw);
    });
    Object.keys(groups).forEach(key=>{
      const list=groups[key];
      const parts=key.split('v'); const i=+parts[0], j=+parts[1];
      const pi=prev[i], pj=prev[j], ci=cur[i], cj=cur[j];
      if(!pi||!pj||!ci||!cj) return;
      if([pi,pj,ci,cj].some(x=>x.elapsed==null)) return;
      const swing=(pi.elapsed-pj.elapsed)-(ci.elapsed-cj.elapsed); /* + => boat i improved */
      list.forEach(sw=>{
        const inI = sw.iBoat===i? sw.bName : sw.aName;
        const outI= sw.iBoat===i? sw.aName : sw.bName;
        events.push({ raceLabel:r.label, side:sw.side,
          winner: swing>=0? inI:outI, loser: swing>=0? outI:inI,
          margin:Math.abs(swing), boats:(i+1)+' & '+(j+1), combined:list.length>1 });
      });
    });
  });
  const net={};
  events.filter(e=>!e.combined).forEach(e=>{
    const add=(name,delta,win)=>{
      const k=e.side+'|'+name;
      const a=(net[k]=net[k]||{name,side:e.side,net:0,w:0,l:0,n:0});
      a.net+=delta; a.n++; if(win)a.w++; else a.l++;
    };
    add(e.winner, e.margin, true); add(e.loser, -e.margin, false);
  });
  return {events, net:Object.values(net)};
}

/* ---------- analysis: matrices ---------- */
/* Within each completed flight, every boat's time is expressed as % off the
   fastest boat in that flight (0% = fastest), which self-corrects for
   conditions drifting between pieces. Athletes are ranked on their average
   % off fastest; raw average and best times are shown alongside.
   Single-boat flights count toward raw averages but not % scores. */
function tstMatrixAgg(s){
  const agg={};
  const gm = scaledGmtMs(s.sex + (s.type==='pairs'? '2-':'2x'), s.distance);
  const add=(side,name,pct,t)=>{
    const k=side+'|'+name;
    const a=(agg[k]=agg[k]||{name,side,n:0,sumT:0,nPct:0,sumPct:0,sumGmt:0,best:null});
    a.n++; a.sumT+=t; if(a.best==null||t<a.best)a.best=t;
    if(gm) a.sumGmt += gm/t*100;
    if(pct!=null){ a.nPct++; a.sumPct+=pct; }
  };
  (s.raceOrder||[]).forEach(rid=>{
    const r=s.races[rid]; const res=tstRaceResults(r); if(!res) return;
    const done=res.filter(x=>x.elapsed!=null);
    if(!done.length) return;
    const tf=Math.min.apply(null, done.map(x=>x.elapsed));
    done.forEach(x=>{
      const L=(r.boats||[])[x.idx]; if(!L) return;
      const pct = done.length>=2? (x.elapsed-tf)/tf*100 : null;
      if(s.type==='pairs'){ add('S',L.stroke,pct,x.elapsed); add('B',L.bow,pct,x.elapsed); }
      else { add('x',L.stroke,pct,x.elapsed); add('x',L.bow,pct,x.elapsed); }
    });
  });
  return Object.values(agg);
}
function tstRankSort(a,b){
  if(a.sumT!==b.sumT) return a.sumT-b.sumT;   /* cumulative time, ascending */
  const pa=a.nPct? a.sumPct/a.nPct : Infinity;
  const pb=b.nPct? b.sumPct/b.nPct : Infinity;
  return pa-pb;
}

/* ---------- rendering ---------- */
function renderTesting(){
  const el=document.getElementById('viewTesting');
  if(!el || currentView!=='Testing') return;
  tstFetchPieces();
  if(tst.screen==='session' && tst.openId && db.sessions[tst.openId]) el.innerHTML=tstSessionHtml(tst.openId);
  else if(tst.screen==='new' && tst.draft) el.innerHTML=tstSetupHtml();
  else { tst.screen='hub'; el.innerHTML=tstHubHtml(); }
}
