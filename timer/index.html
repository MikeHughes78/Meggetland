/* ---------- session dashboard ---------- */
function tstLineupText(s, L, i){
  if(s.type==='seat'){
    const names=(L.seats||[]).map(x=>esc(x.name)).join(', ');
    return `<strong>Boat ${i+1}</strong> — ${names}${L.cox?' · cox '+esc(L.cox):''}`;
  }
  return `<strong>Boat ${i+1}</strong> — Str: ${esc(L.stroke)} · Bow: ${esc(L.bow)}`;
}
function tstScheduleHtml(sid, s){
  let lastRound=null, out='';
  (s.raceOrder||[]).forEach(rid=>{
    const r=(s.races||{})[rid]; if(!r) return;
    if(s.type!=='seat' && r.round!==lastRound){ out+=`<div class="roundHead">Round ${r.round}</div>`; lastRound=r.round; }
    const st=tstStatus(r);
    const res=tstRaceResults(r);
    const lines=(r.boats||[]).map((L,i)=>{
      const t=res&&res[i]&&res[i].elapsed!=null? ` · <span style="font-family:var(--mono)">${fmtElapsed(res[i].elapsed)}</span>` : '';
      return `<div>${tstLineupText(s,L,i)}${t}</div>`;
    }).join('');
    const swaps=(r.swaps&&r.swaps.length)? `<div class="lu" style="color:var(--blade-deep)">Swap${r.swaps.length>1?'s':''}: ${r.swaps.map(sw=>esc(sw.aName)+' ⇄ '+esc(sw.bName)+' ('+sideName(sw.side).toLowerCase()+')').join(' · ')}</div>` : '';
    const actions = (st.create||st.ready) ? `<button class="btn small" onclick="tstRunRace('${sid}','${rid}')">Run</button>`
      : st.results ? `<button class="btn small ghost" onclick="openPiece('${r.pieceId}')">Results</button>`
      : `<button class="btn small" onclick="tstRunRace('${sid}','${rid}')">Continue</button>`;
    const edit = r.pieceId? `<button class="btn small ghost" onclick="editPiece('${r.pieceId}')">Edit</button>` : '';
    out+=`<div class="tRace">
      <div class="top"><span class="nm">${esc(r.label)}</span>${st.pill||''}<span class="actions">${actions}${edit}</span></div>
      ${swaps}
      <div class="lu">${lines}</div>
    </div>`;
  });
  return out;
}
function tstMatrixRankHtml(rows, title, note, dist){
  rows.sort(tstRankSort);
  const tr=rows.map((a,i)=>`<tr class="rank${i+1}">
    <td>${i+1}</td>
    <td>${esc(a.name)}</td>
    <td class="num">${a.n}</td>
    <td class="num"><span class="bigPct">${fmtElapsed(a.sumT)}</span></td>
    <td class="num">${splitPer500(a.sumT/a.n, dist)}</td>
    <td class="num">${a.sumGmt? (a.sumGmt/a.n).toFixed(1)+'%':'—'}</td>
    <td class="num">${a.nPct? (a.sumPct/a.nPct).toFixed(2)+'%':'—'}</td>
    <td class="num">${a.best!=null?fmtElapsed(a.best):'—'}</td>
  </tr>`).join('');
  return `<h2 style="margin-top:14px">${title}</h2>
  <div style="overflow-x:auto"><table><thead><tr><th>#</th><th>Athlete</th><th class="num">Races</th><th class="num">Total time</th><th class="num">Avg /500m</th><th class="num">Avg GMT%</th><th class="num">Avg % off</th><th class="num">Best</th></tr></thead>
  <tbody>${tr||'<tr><td colspan="8" class="hint">No completed races yet.</td></tr>'}</tbody></table></div>
  ${note?'<p class="hint" style="margin-top:8px">'+note+'</p>':''}`;
}
function tstSeatRankHtml(s){
  const {events, net}=tstSeatAnalysis(s);
  const tableFor=side=>{
    const rows=net.filter(x=>x.side===side).sort((a,b)=>b.net-a.net);
    const tr=rows.map((a,i)=>`<tr class="rank${i+1}">
      <td>${i+1}</td><td>${esc(a.name)}</td>
      <td class="num">${a.n}</td><td class="num">${a.w}–${a.l}</td>
      <td class="num"><span class="${a.net>=0?'netPos':'netNeg'}">${fmtNet(a.net)}</span></td>
    </tr>`).join('');
    return `<h2 style="margin-top:14px">${sideName(side)} ranking</h2>
    <table><thead><tr><th>#</th><th>Athlete</th><th class="num">Swaps</th><th class="num">W–L</th><th class="num">Net margin</th></tr></thead>
    <tbody>${tr||'<tr><td colspan="5" class="hint">No attributable swaps completed yet.</td></tr>'}</tbody></table>`;
  };
  const evRows=events.map(e=>`<div class="swapLine">
    <span style="color:var(--sub);min-width:64px">${esc(e.raceLabel)}</span>
    <span><strong>${esc(e.winner)}</strong> beat <strong>${esc(e.loser)}</strong> by <span style="font-family:var(--mono)">${fmtSecs(e.margin)}</span></span>
    <span style="color:var(--sub);font-size:.72rem">${sideName(e.side).toLowerCase()} · boats ${e.boats}${e.combined?' · combined swap — not in ranking':''}</span>
  </div>`).join('');
  return tableFor('S') + tableFor('B') +
    (events.length? `<h2 style="margin-top:14px">Head-to-heads</h2>${evRows}
      <p class="hint" style="margin-top:8px">Each swing is the change in margin between the two boats before and after the swap, credited to the swapped rowers. When both sides swap between the same two boats at once, the swing can't be split between the two swaps, so those races are listed but excluded from the net ranking.</p>` : '');
}
function tstSessionHtml(sid){
  const s=db.sessions[sid];
  const total=(s.raceOrder||[]).length;
  const doneN=(s.raceOrder||[]).filter(rid=>{
    const res=tstRaceResults((s.races||{})[rid]);
    return res && res.length && res.every(x=>x.elapsed!=null);
  }).length;
  const meta=`${TYPE_LABEL[s.type]} · ${s.sex==='M'?'Men':'Women'} · ${s.distance}m · ${s.startMode==='mass'?'regatta start':'time trial'} · ${doneN}/${total} races complete`;
  let swapPanel='';
  if(s.type==='seat'){
    const base=s.races[s.raceOrder[s.raceOrder.length-1]];
    const stagedBoats=JSON.parse(JSON.stringify(base.boats));
    tst.staged.forEach(sw=>{ const A=stagedBoats[sw.i].seats[sw.si], B=stagedBoats[sw.j].seats[sw.sj]; const t=A.name; A.name=B.name; B.name=t; });
    const boatsHtml=base.boats.map((b,i)=>`<div class="tBoatBox"><h4>Boat ${i+1}</h4>
      ${b.seats.map((st,j)=>{
        const sel=tst.pick&&tst.pick.i===i&&tst.pick.j===j;
        const used=tstSeatUsed(i,j);
        const shown=stagedBoats[i].seats[j].name;
        return `<button class="athChip ${sel?'sel':''} ${used?'used':''}" onclick="tstPickRower(${i},${j})">${esc(shown)}<span class="st ${st.side==='B'?'b':''}">${st.side}</span></button>`;
      }).join('')}
      ${b.cox?`<div class="hint" style="margin-top:4px">Cox: ${esc(b.cox)}</div>`:''}
    </div>`).join('');
    const stagedHtml=tst.staged.map((sw,k)=>{
      const a=base.boats[sw.i].seats[sw.si], b2=base.boats[sw.j].seats[sw.sj];
      return `<div class="swapLine"><span class="arr">⇄</span>
        <span><strong>${esc(a.name)}</strong> (boat ${sw.i+1}) with <strong>${esc(b2.name)}</strong> (boat ${sw.j+1}) · ${sideName(a.side).toLowerCase()}</span>
        <button class="rawDel" style="margin-left:auto" onclick="tstUnstage(${k})">✕</button></div>`;
    }).join('');
    swapPanel=`<div class="panel">
      <h2>Next race — stage swaps</h2>
      <p class="hint" style="margin-bottom:10px">Line-ups from ${esc(base.label)}${tst.staged.length?' with staged swaps applied':''}. Tap one rower, then a rower on the same side in another boat.${tst.pick?' <strong>'+esc(base.boats[tst.pick.i].seats[tst.pick.j].name)+' selected — now pick their opposite number.</strong>':''}</p>
      ${boatsHtml}
      ${stagedHtml?`<div style="margin-top:6px">${stagedHtml}</div>`:''}
      <div class="row" style="margin-top:12px">
        <button class="btn" onclick="tstCreateSwapRace()">Create Race ${s.raceOrder.length+1}</button>
        ${tst.staged.length?`<button class="btn ghost" onclick="tst.staged=[];tst.pick=null;renderTesting()">Clear swaps</button>`:''}
      </div>
    </div>`;
  }
  let rankings='';
  if(s.type==='seat') rankings=tstSeatRankHtml(s);
  else {
    const agg=tstMatrixAgg(s);
    const note='Ranked by total cumulative time across completed races — only a fair comparison while everyone has raced the same number of times (check the Races column). Avg /500m and Avg GMT% are averaged per race; Avg % off = average gap to the fastest boat in each flight (0% = fastest, lower is better), a useful conditions-proof cross-check.';
    if(s.type==='pairs') rankings = tstMatrixRankHtml(agg.filter(x=>x.side==='S'),'Stroke side ranking','',s.distance) + tstMatrixRankHtml(agg.filter(x=>x.side==='B'),'Bow side ranking',note,s.distance);
    else rankings = tstMatrixRankHtml(agg,'Ranking',note,s.distance);
  }
  return `<div class="panel">
    <div class="row" style="margin-bottom:6px">
      <button class="btn small ghost" onclick="tstBack()">‹ All sessions</button>
      <span style="flex:1"></span>
      <button class="btn small" onclick="tstExportPdf('${sid}')">PDF</button>
      <button class="btn small danger" onclick="tstDeleteSession('${sid}')">Delete</button>
    </div>
    <h2>${esc(s.name)}</h2>
    <p class="hint">${meta}</p>
  </div>
  ${swapPanel}
  <div class="panel">
    <h2>Rankings</h2>
    <p class="hint">Updates live as races complete.</p>
    ${rankings}
  </div>
  <div class="panel">
    <h2>Race schedule</h2>
    ${tstScheduleHtml(sid,s)||'<p class="hint">No races planned.</p>'}
  </div>`;
}

/* ---------- session PDF ---------- */
function tstExportPdf(sid){
  const s=db.sessions[sid]; if(!s){ toast('Session not found'); return; }
  const { jsPDF } = window.jspdf;
  const doc=new jsPDF();
  doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(14,40,65);
  doc.text('EUBC Testing — '+(s.name||''), 14, 18);
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(102,112,124);
  doc.text([ new Date(s.createdAt||0).toLocaleString('en-GB'),
    TYPE_LABEL[s.type]+' · '+(s.sex==='M'?'Men':'Women')+' · '+s.distance+'m · '+(s.startMode==='mass'?'regatta start':'time trial') ], 14, 25);
  let y=36;
  const head={fillColor:[14,40,65],textColor:[255,255,255],fontStyle:'bold'};
  const alt={fillColor:[242,243,245]};
  const table=(title, headRow, body)=>{
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(14,40,65);
    doc.text(title, 14, y); y+=3;
    doc.autoTable({ startY:y, head:[headRow], body,
      styles:{font:'helvetica',fontSize:9,cellPadding:2.5}, headStyles:head, alternateRowStyles:alt });
    y=doc.lastAutoTable.finalY+10;
  };
  if(s.type==='seat'){
    const {events, net}=tstSeatAnalysis(s);
    ['S','B'].forEach(side=>{
      const rows=net.filter(x=>x.side===side).sort((a,b)=>b.net-a.net)
        .map((a,i)=>[i+1,a.name,a.n,a.w+'-'+a.l,fmtNet(a.net).replace('−','-')]);
      table(sideName(side)+' ranking', ['#','Athlete','Swaps','W-L','Net margin'], rows.length?rows:[['—','No attributable swaps yet','','','']]);
    });
    if(events.length){
      table('Head-to-heads', ['Race','Result','Side','Boats','Note'],
        events.map(e=>[e.raceLabel, e.winner+' beat '+e.loser+' by '+fmtSecs(e.margin), sideName(e.side), e.boats, e.combined?'Combined swap — excluded from ranking':'']));
    }
  } else {
    const agg=tstMatrixAgg(s);
    const rowsFor=list=>list.sort(tstRankSort).map((a,i)=>[i+1,a.name,a.n,fmtElapsed(a.sumT),splitPer500(a.sumT/a.n,s.distance),a.sumGmt?(a.sumGmt/a.n).toFixed(1)+'%':'-',a.nPct?(a.sumPct/a.nPct).toFixed(2)+'%':'-',a.best!=null?fmtElapsed(a.best):'-']);
    const headRow=['#','Athlete','Races','Total time','Avg /500m','Avg GMT%','Avg % off fastest','Best'];
    if(s.type==='pairs'){
      table('Stroke side ranking', headRow, rowsFor(agg.filter(x=>x.side==='S')));
      table('Bow side ranking', headRow, rowsFor(agg.filter(x=>x.side==='B')));
    } else {
      table('Ranking', headRow, rowsFor(agg));
    }
  }
  const raceRows=[];
  (s.raceOrder||[]).forEach(rid=>{
    const r=(s.races||{})[rid]; if(!r) return;
    const res=tstRaceResults(r);
    (r.boats||[]).forEach((L,i)=>{
      const crew = s.type==='seat'
        ? (L.seats||[]).map(x=>x.name).join(', ')+(L.cox?' · cox '+L.cox:'')
        : 'Str: '+L.stroke+' · Bow: '+L.bow;
      const t=res&&res[i]&&res[i].elapsed!=null? fmtElapsed(res[i].elapsed):'-';
      raceRows.push([i===0?r.label:'', 'Boat '+(i+1), crew, t]);
    });
  });
  if(raceRows.length) table('Races', ['Race','Boat','Crew','Time'], raceRows);
  doc.setFontSize(8); doc.setTextColor(150);
  doc.text('Generated '+new Date().toLocaleString('en-GB')+' · Edinburgh University Boat Club', 14, 290);
  doc.save((s.name||'testing').replace(/[^\w\-]+/g,'_')+'_testing.pdf');
}
</script>
<script>
/* =====================================================
   Views
   ===================================================== */
const VIEWS=['Home','Setup','Start','Finish','Results','Pieces','Testing','Settings'];
let currentView='Home';
let startTick=null, finishTick=null;
let invListOpen=false;
document.getElementById('nav').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  showView(b.dataset.v);
});
function showView(v){
  currentView=v;
  VIEWS.forEach(x=>{
    const el=document.getElementById('view'+x);
    el.classList.toggle('hidden', x!==v);
    if(x!==v) el.innerHTML='';
  });
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.v===v));
  // nav is a landing page — hide the tab bar on Home
  document.getElementById('nav').style.display = (v==='Home') ? 'none' : '';
  if(v!=='Start') clearInterval(startTick);
  if(v!=='Finish') clearInterval(finishTick);
  renderCurrent();
  window.scrollTo({top:0});
}
function renderCurrent(){
  if(VIEWONLY){ renderResults(); return; }
  ({Home:renderHome,Setup:renderSetup,Start:renderStart,Finish:renderFinish,Results:renderResults,Pieces:renderPieces,Testing:renderTesting,Settings:renderSettings})[currentView]();
}

/* =====================================================
   Home
   ===================================================== */
function renderHome(){
  const el=document.getElementById('viewHome');
  const p=activePiece();
  const resume = p ? `<div class="resume">Current piece: <a onclick="showView('Start')">${esc(p.name)}</a> · ${p.distance}m</div>` : '';
  el.innerHTML = `<div class="home">
    <img src="eubc-logo.png" class="crest" alt="Edinburgh University Boat Club" onerror="this.style.display='none'">
    <div class="wordmark">EUBC <span>Timing</span></div>
    <div class="tag">Edinburgh University Boat Club</div>
    <div class="actions">
      <div class="homeBtn primary" onclick="startNewPiece()">
        <div class="ic">＋</div>
        <div class="tx"><div class="tt">Start new piece</div><div class="ds">Set distance, boats and crews</div></div>
        <div class="chev">›</div>
      </div>
      <div class="homeBtn" onclick="showView('Pieces')">
        <div class="ic">≣</div>
        <div class="tx"><div class="tt">Open existing piece</div><div class="ds">Saved pieces, results and PDFs</div></div>
        <div class="chev">›</div>
      </div>
      <div class="homeBtn" onclick="showView('Testing')">
        <div class="ic">⇄</div>
        <div class="tx"><div class="tt">Run testing</div><div class="ds">Seat racing, pairs &amp; doubles matrices</div></div>
        <div class="chev">›</div>
      </div>
      <div class="homeBtn" onclick="showView('Settings')">
        <div class="ic">⚙</div>
        <div class="tx"><div class="tt">Settings</div><div class="ds">Gold medal times and timing sync</div></div>
        <div class="chev">›</div>
      </div>
    </div>
    ${resume}
  </div>`;
}
function startNewPiece(){
  draft = newDraft();
  showView('Setup');
}

/* =====================================================
   Setup — draft piece
   ===================================================== */
let draft = null;
function newDraft(){
  return { name:'', distance:2000, startMode:'staggered', boats:[], editingId:null };
}
function loadActiveIntoDraft(){
  const p=activePiece(); if(!p) return;
  draft = {
    name:p.name||'', distance:p.distance||2000, startMode:p.startMode||'staggered',
    editingId: db.activePieceId,
    boats: boatsInOrder(p).map(b=>({ ident:b.ident||'', category:b.category||'M1x', crew:Object.assign({},b.crew||{}), lane:b.lane||0, invId:b.invId||null, _id:b.id }))
  };
  renderSetup();
}
function renderSetup(){
  if(!draft) draft=newDraft();
  const el=document.getElementById('viewSetup');
  const distChips=[250,500,1000,1500,2000,5000].map(d=>
    `<button class="chip ${draft.distance===d?'on':''}" onclick="setDist(${d})">${d}m</button>`).join('');
  el.innerHTML = `
  <div class="panel">
    <h2>${draft.editingId?'Edit piece':'New piece'}</h2>
    <div class="row">
      <label class="fld" style="flex:1;min-width:170px">Piece name
        <input id="pName" value="${esc(draft.name)}" placeholder="e.g. Tues AM · Piece 1" oninput="draft.name=this.value">
      </label>
      <label class="fld">Distance (m)
        <input id="pDist" type="number" min="50" step="50" value="${draft.distance}" oninput="draft.distance=Math.max(0,parseInt(this.value)||0);">
      </label>
    </div>
    <div class="row">${distChips}</div>
    <div class="row">
      <label class="fld" style="flex:1">Start type
        <select onchange="draft.startMode=this.value">
          <option value="staggered" ${draft.startMode==='staggered'?'selected':''}>Time trial — one after the other</option>
          <option value="mass" ${draft.startMode==='mass'?'selected':''}>Regatta start — all boats together</option>
        </select>
      </label>
      <button class="btn ghost" style="align-self:flex-end" onclick="addBoat()">+ Add boat</button>
    </div>
    <p class="hint">GMT% is scaled to the piece distance from the 2k gold medal times in Settings.</p>
  </div>
  <div id="boatList">${draft.boats.map((b,i)=>boatCardHtml(b,i)).join('')||'<p class="hint" style="padding:0 4px 12px">No boats yet — add your first boat above.</p>'}</div>
  <div class="panel">
    <div class="row" style="margin:0">
      <button class="btn" onclick="savePiece('now')">Save and run now</button>
      <button class="btn ghost" onclick="savePiece('later')">Save for later</button>
      <button class="btn ghost" onclick="draft=newDraft();renderSetup()">Clear</button>
      ${activePiece()&&!draft.editingId?'<button class="btn ghost" onclick="loadActiveIntoDraft()">Edit current piece</button>':''}
    </div>
    <p class="hint" style="margin-top:10px">Run now makes this the active piece and opens Start. Save for later files it in Pieces without changing what's currently active.</p>
  </div>`;
}
function setDist(d){ draft.distance=d; renderSetup(); }
function addBoat(){
  draft.boats.push({ ident:String(draft.boats.length+1), category:'M1x', crew:{}, lane:0, invId:null });
  renderSetup();
}
function boatCardHtml(b,i){
  const pos=positionsFor(b.category);
  const inv=inventory();
  const invIds=Object.keys(inv).sort((a,c)=>(inv[a].ident||'').localeCompare(inv[c].ident||''));
  const hasInv=invIds.length>0;
  // category options: if boat came from inventory, restrict to that hull type's M/F pair
  const invPicker = hasInv ? `<label class="fld" style="flex:1;min-width:150px">Boat (from inventory)
        <select onchange="pickInvBoat(${i}, this.value)">
          <option value="">— Manual entry —</option>
          ${invIds.map(id=>`<option value="${id}" ${b.invId===id?'selected':''}>${esc(inv[id].ident)} · ${typeLabel(inv[id].type)}</option>`).join('')}
        </select>
      </label>` : '';
  const laneOpts = [0,1,2,3,4,5,6,7,8].map(n=>`<option value="${n}" ${(b.lane||0)===n?'selected':''}>${n===0?'—':n}</option>`).join('');
  return `<div class="boatCard">
    <div class="head">
      ${invPicker}
      <label class="fld">Bow number
        <input style="width:96px" value="${esc(b.ident)}" oninput="draft.boats[${i}].ident=this.value">
      </label>
      <label class="fld" style="flex:1;min-width:140px">Category
        <select onchange="draft.boats[${i}].category=this.value;renderSetup()">
          ${CATS.map(c=>`<option value="${c}" ${b.category===c?'selected':''}>${catLabel(c)}</option>`).join('')}
        </select>
      </label>
      <label class="fld">Lane
        <select style="width:70px" onchange="draft.boats[${i}].lane=parseInt(this.value)||0">
          ${laneOpts}
        </select>
      </label>
      <button class="btn small danger" onclick="draft.boats.splice(${i},1);renderSetup()">Remove</button>
    </div>
    <div class="crewGrid">
      ${pos.map((p,j)=>`<label class="fld">${p}
        <input value="${esc(b.crew[j]||'')}" placeholder="Name" oninput="draft.boats[${i}].crew[${j}]=this.value">
      </label>`).join('')}
    </div>
  </div>`;
}
function pickInvBoat(i, invId){
  const b=draft.boats[i];
  if(!invId){ b.invId=null; renderSetup(); return; }
  const hull=inventory()[invId];
  if(!hull){ renderSetup(); return; }
  // inventory only supplies the bow-number identifier; category is untouched
  b.invId=invId; b.ident=hull.ident;
  renderSetup();
}
function savePiece(mode){
  if(!draft.boats.length){ toast('Add at least one boat'); return; }
  if(!draft.distance){ toast('Set a distance'); return; }
  const id = draft.editingId || ('p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6));
  const existing = draft.editingId ? (db.pieces[id]||{}) : {};
  const boats={}, order=[];
  draft.boats.forEach((b,i)=>{
    const bid = b._id || ('b'+i+'_'+Math.random().toString(36).slice(2,7));
    const prev = (existing.boats||{})[bid]||{};
    const crew={}; positionsFor(b.category).forEach((p,j)=>{ if((b.crew[j]||'').trim()) crew[j]=b.crew[j].trim(); });
    boats[bid]={ ident:(b.ident||'').trim()||String(i+1), category:b.category, crew,
                 lane:b.lane||0, invId:b.invId||null,
                 startTs:prev.startTs!=null?prev.startTs:null, finishTs:prev.finishTs!=null?prev.finishTs:null };
    order.push(bid);
  });
  const piece={ name:(draft.name||'').trim()||('Piece '+new Date().toLocaleDateString('en-GB')),
    distance:draft.distance, startMode:draft.startMode,
    createdAt: existing.createdAt || nowMs(), boats, order };
  const wasEdit=!!draft.editingId;
  fbSet('pieces/'+id, piece);
  draft=newDraft();
  if(mode==='now'){
    fbSet('activePieceId', id);
    subscribeActivePiece();
    toast(wasEdit?'Piece updated — now active':'Piece created — now active');
    showView('Start');
  } else {
    toast(wasEdit?'Saved for later':'Saved for later');
    showView('Pieces');
  }
}

/* =====================================================
   Stamp on pointerdown (fastest possible), hold to clear
   ===================================================== */
function stampDown(ev, pieceId, boatId, field){
  const t = nowMs();               // capture the instant of touch, before anything else
  stampBeep(); buzz(15);
  fbSet('pieces/'+pieceId+'/boats/'+boatId+'/'+field, t);
  const btn=document.querySelector(`.stampBtn[data-bid="${boatId}"]`);
  if(btn) btn.classList.add('flash');
}
let lpTimer=null;
function lpStart(ev, pieceId, boatId, field){
  const btn=ev.currentTarget;
  btn.classList.add('holding');
  lpTimer=setTimeout(()=>{
    btn.classList.remove('holding');
    fbSet('pieces/'+pieceId+'/boats/'+boatId+'/'+field, null);
    clearBeep(); buzz(30);
    toast((field==='startTs'?'Start':'Finish')+' time cleared');
  },600);
}
function lpEnd(ev){
  clearTimeout(lpTimer);
  ev.currentTarget.classList.remove('holding');
}

/* =====================================================
   Close finish / misaligned start — capture raw times
   fast on one pad, assign to boats afterwards
   ===================================================== */
let captureOpen = { start:false, finish:false };  // is the capture pad shown
const RAW_NODE = { start:'rawStart', finish:'rawFinish' };
const TS_FIELD = { start:'startTs', finish:'finishTs' };
function rawStamps(p, kind){
  const raw=(p&&p[RAW_NODE[kind]])||{};
  return Object.keys(raw).map(sid=>({sid, ts:raw[sid]})).sort((a,b)=>a.ts-b.ts);
}
function toggleCapture(kind){
  captureOpen[kind]=!captureOpen[kind];
  renderCurrent();
}
function captureStamp(ev, pieceId, kind){
  const t = nowMs();               // capture instant first, always
  stampBeep(); buzz(15);
  const sid='s'+t.toString(36)+Math.random().toString(36).slice(2,5);
  fbSet('pieces/'+pieceId+'/'+RAW_NODE[kind]+'/'+sid, t);
  const btn=document.querySelector(`.captureBtn[data-cap="${kind}"]`);
  if(btn) btn.classList.add('flash');
}
function assignRaw(pieceId, sid, boatId, kind){
  const p=db.pieces[pieceId]; if(!p) return;
  const ts=(p[RAW_NODE[kind]]||{})[sid];
  if(ts==null) return;
  fbSet('pieces/'+pieceId+'/boats/'+boatId+'/'+TS_FIELD[kind], ts);
  fbSet('pieces/'+pieceId+'/'+RAW_NODE[kind]+'/'+sid, null);
  const b=(p.boats||{})[boatId];
  toast('Assigned to '+((b&&b.ident)||'boat'));
}
function deleteRaw(pieceId, sid, kind){
  if(!confirm('Delete this recorded time?')) return;
  fbSet('pieces/'+pieceId+'/'+RAW_NODE[kind]+'/'+sid, null);
}
/* Capture pad + assignment list. Candidates = boats that can take the time. */
function capturePanelHtml(pieceId, kind, candidates){
  const p=db.pieces[pieceId];
  const stamps=rawStamps(p, kind);
  const label = kind==='finish' ? 'Close finish' : 'Misaligned start';
  const toggle = `<div class="row" style="margin-bottom:8px">
    <button class="btn small ghost" onclick="toggleCapture('${kind}')">${captureOpen[kind] ? 'Close pad' : label + (stamps.length?' ('+stamps.length+' to assign)':'')}</button>
  </div>`;
  const pad = captureOpen[kind] ? `<button class="captureBtn" data-cap="${kind}" onpointerdown="captureStamp(event,'${pieceId}','${kind}')" oncontextmenu="return false">
      Tap ${kind==='finish'?'at each bow':'as each boat crosses'}
      <span class="sub">${stamps.length} recorded — times bank instantly, assign crews below</span>
    </button>` : '';
  let assign='';
  if(stamps.length){
    const rows=stamps.map((s,n)=>{
      const chips = candidates.length
        ? candidates.map(b=>`<button class="bowChip" onclick="assignRaw('${pieceId}','${s.sid}','${b.id}','${kind}')">${esc(b.ident)}</button>`).join('')
        : '<span class="hint">No boats awaiting a time</span>';
      return `<div class="rawRow">
        <span class="rawN">T${n+1}</span>
        <span class="rawT">${fmtWallClock(s.ts)}</span>
        ${chips}
        <button class="rawDel" onclick="deleteRaw('${pieceId}','${s.sid}','${kind}')">✕</button>
      </div>`;
    }).join('');
    assign = `<div class="rawBox">
      <h3>Recorded times — tap a bow number to assign</h3>
      ${rows}
    </div>`;
  }
  return toggle + pad + assign;
}

/* =====================================================
   Start
   ===================================================== */
function renderStart(){
  const el=document.getElementById('viewStart');
  const p=activePiece();
  if(!p){ el.innerHTML='<div class="panel"><h2>Start</h2><p class="hint">No active piece. Create one in Setup.</p></div>'; return; }
  const id=db.activePieceId, boats=boatsInOrder(p);
  let inner='';
  if(p.startMode==='mass'){
    const allStarted = boats.length>0 && boats.every(b=>b.startTs!=null);
    const anyRunning = boats.some(b=>b.startTs!=null && b.finishTs==null);
    if(!allStarted){
      inner += `<button class="massBtn" data-bid="__mass" onpointerdown="massStart(event,'${id}')" oncontextmenu="return false">Start all<span class="sub">One tap — same synced time for every boat</span></button>`;
    } else if(anyRunning){
      inner += `<button class="massBtn done" data-bid="__mass" onpointerdown="lpMassClear(event,'${id}')" onpointerup="lpEnd(event)" onpointercancel="lpEnd(event)" onpointerleave="lpEnd(event)" oncontextmenu="return false"><span class="runTag"><span class="runDot"></span>RUNNING</span> · <span data-runlive="${boats[0].startTs}">${fmtElapsed(nowMs()-boats[0].startTs)}</span><span class="sub">Hold to clear all starts</span></button>`;
    } else {
      inner += `<div class="massBtn done" style="cursor:default"><span class="runTag" style="color:var(--green-deep)">✓ ALL FINISHED</span><span class="sub">See Results for times</span></div>`;
    }
  }
  inner += boats.map(b=>{
    const running = b.startTs!=null && b.finishTs==null;
    const finished = b.startTs!=null && b.finishTs!=null;
    if(finished) return `<button class="stampBtn done" data-bid="${b.id}">
          <span class="ident">${esc(b.ident)}</span>
          <span class="meta"><div class="cat">${catLine(b)}</div><div class="crew">${esc(crewText(b))||'&nbsp;'}</div></span>
          <span class="time">${fmtElapsed(b.finishTs-b.startTs)}<span class="sub">Finished</span></span>
        </button>`;
    if(running) return `<button class="stampBtn running" data-bid="${b.id}" onpointerdown="lpStart(event,'${id}','${b.id}','startTs')" onpointerup="lpEnd(event)" onpointercancel="lpEnd(event)" onpointerleave="lpEnd(event)" oncontextmenu="return false">
          <span class="ident">${esc(b.ident)}</span>
          <span class="meta"><div class="cat">${catLine(b)}</div><div class="crew">${esc(crewText(b))||'&nbsp;'}</div></span>
          <span class="time"><span class="runTag"><span class="runDot"></span>RUNNING</span><br><span data-runlive="${b.startTs}">${fmtElapsed(nowMs()-b.startTs)}</span><span class="sub">Hold to clear</span></span>
        </button>`;
    return `<button class="stampBtn" data-bid="${b.id}" onpointerdown="stampDown(event,'${id}','${b.id}','startTs')" oncontextmenu="return false">
          <span class="ident">${esc(b.ident)}</span>
          <span class="meta"><div class="cat">${catLine(b)}</div><div class="crew">${esc(crewText(b))||'&nbsp;'}</div></span>
          <span class="time">Tap to start</span>
        </button>`;
  }).join('');
  el.innerHTML = `<div class="panel"><h2>Start · ${esc(p.name)} · ${p.distance}m</h2>
    <p class="hint" style="margin-bottom:12px">${p.startMode==='mass'?'Regatta start — one tap starts every boat on the same server-synced time.':'Time trial — tap each boat the instant it crosses the start.'}</p>
    ${p.startMode!=='mass' ? capturePanelHtml(id,'start',boats.filter(b=>b.startTs==null)) : ''}
    ${inner}</div>`;
  clearInterval(startTick);
  if(boats.some(b=>b.startTs!=null && b.finishTs==null) && currentView==='Start'){
    startTick=setInterval(()=>{
      document.querySelectorAll('#viewStart [data-runlive]').forEach(s=>{ s.textContent=fmtElapsed(nowMs()-Number(s.dataset.runlive)); });
    },50);
  }
}

function massStart(ev,id){
  const t = nowMs();
  const p=db.pieces[id]; if(!p) return;
  stampBeep(); buzz(20);
  boatsInOrder(p).forEach(b=>{ if(b.startTs==null) fbSet('pieces/'+id+'/boats/'+b.id+'/startTs', t); });
  const btn=document.querySelector(`.massBtn[data-bid="__mass"]`);
  if(btn) btn.classList.add('flash');
  toast('All boats started');
}
function lpMassClear(ev,id){
  const btn=ev.currentTarget;
  btn.classList.add('holding');
  lpTimer=setTimeout(()=>{
    btn.classList.remove('holding');
    const p=db.pieces[id];
    boatsInOrder(p).forEach(b=>fbSet('pieces/'+id+'/boats/'+b.id+'/startTs', null));
    clearBeep(); buzz(30);
    toast('All start times cleared');
  },600);
}

/* =====================================================
   Finish
   ===================================================== */
function renderFinish(){
  const el=document.getElementById('viewFinish');
  const p=activePiece();
  if(!p){ el.innerHTML='<div class="panel"><h2>Finish</h2><p class="hint">No active piece. Create one in Setup.</p></div>'; return; }
  const id=db.activePieceId, boats=boatsInOrder(p);
  const onWater = boats.filter(b=>b.startTs!=null && b.finishTs==null);
  const finished = boats.filter(b=>b.finishTs!=null && b.startTs!=null);
  const notStarted = boats.filter(b=>b.startTs==null);
  const btn = b=>{
    const running = b.startTs!=null && b.finishTs==null;
    const done = b.finishTs!=null;
    if(done) return `<button class="stampBtn done" data-bid="${b.id}" onpointerdown="lpStart(event,'${id}','${b.id}','finishTs')" onpointerup="lpEnd(event)" onpointercancel="lpEnd(event)" onpointerleave="lpEnd(event)" oncontextmenu="return false">
        <span class="ident">${esc(b.ident)}</span>
        <span class="meta"><div class="cat">${catLine(b)}</div><div class="crew">${esc(crewText(b))||'&nbsp;'}</div></span>
        <span class="time">${fmtElapsed(b.finishTs-b.startTs)}<span class="sub">Hold to clear</span></span>
      </button>`;
    if(running) return `<button class="stampBtn" data-bid="${b.id}" onpointerdown="stampDown(event,'${id}','${b.id}','finishTs')" oncontextmenu="return false">
        <span class="ident">${esc(b.ident)}</span>
        <span class="meta"><div class="cat">${catLine(b)}</div><div class="crew">${esc(crewText(b))||'&nbsp;'}</div></span>
        <span class="time"><span data-live="${b.startTs}">${fmtElapsed(nowMs()-b.startTs)}</span><span class="sub">Tap at the line</span></span>
      </button>`;
    return `<button class="stampBtn waiting" data-bid="${b.id}">
        <span class="ident">${esc(b.ident)}</span>
        <span class="meta"><div class="cat">${catLine(b)}</div><div class="crew">${esc(crewText(b))||'&nbsp;'}</div></span>
        <span class="time">Not started</span>
      </button>`;
  };
  el.innerHTML = `<div class="panel"><h2>Finish · ${esc(p.name)} · ${p.distance}m</h2>
    <p class="hint" style="margin-bottom:12px">Tap the bow number the instant it crosses the line.</p>
    ${capturePanelHtml(id,'finish',onWater)}
    ${onWater.map(btn).join('')||(finished.length?'':'<p class="hint">No boats on the water yet.</p>')}
    ${finished.length?'<h2 style="margin-top:14px">Finished</h2>'+finished.map(btn).join(''):''}
    ${notStarted.length?'<h2 style="margin-top:14px">Waiting to start</h2>'+notStarted.map(btn).join(''):''}
  </div>`;
  clearInterval(finishTick);
  if(onWater.length && currentView==='Finish'){
    finishTick=setInterval(()=>{
      document.querySelectorAll('[data-live]').forEach(s=>{ s.textContent=fmtElapsed(nowMs()-Number(s.dataset.live)); });
    },50);
  }
}

/* =====================================================
   Results (+ view-only mode)
   ===================================================== */
let sortMode = localStorage.getItem(LS.sort)||'time';
function setSort(m){ sortMode=m; localStorage.setItem(LS.sort,m); renderResults(); }
function resultsData(piece){
  const boats=boatsInOrder(piece);
  const done=boats.filter(b=>b.startTs!=null&&b.finishTs!=null)
    .map(b=>({...b, elapsed:b.finishTs-b.startTs, pct:gmtPct(b,piece)}));
  done.sort((a,b)=> sortMode==='gmt'
    ? ((b.pct??-1)-(a.pct??-1))
    : (a.elapsed-b.elapsed));
  const pending=boats.filter(b=>!(b.startTs!=null&&b.finishTs!=null));
  return {done,pending};
}
function resultsTableHtml(piece){
  const {done,pending}=resultsData(piece);
  const rows=done.map((b,i)=>`<tr class="rank${i+1}">
    <td>${i+1}</td>
    <td>${laneBadge(b)}<strong>${esc(b.ident)}</strong> · ${catLabel(b.category)}<div class="crewSmall">${esc(crewText(b))}</div></td>
    <td class="num">${fmtElapsed(b.elapsed)}</td>
    <td class="num">${splitPer500(b.elapsed, piece.distance)}</td>
    <td class="num"><span class="bigPct">${b.pct!=null?b.pct.toFixed(2)+'%':'—'}</span></td>
  </tr>`).join('');
  const pend=pending.length?`<p class="hint" style="margin-top:10px">Still out: ${pending.map(b=>esc(b.ident)).join(', ')}</p>`:'';
  return `<table><thead><tr><th>#</th><th>Boat</th><th class="num">Time</th><th class="num">/500m</th><th class="num">GMT%</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="5" class="hint">No finished boats yet.</td></tr>'}</tbody></table>${pend}`;
}
function renderResults(){
  const el=document.getElementById('viewResults');
  const p=activePiece();
  if(VIEWONLY) el.classList.remove('hidden');
  if(!p){ el.innerHTML='<div class="panel"><h2>Results</h2><p class="hint">No active piece yet.</p></div>'; return; }
  const link = location.origin+location.pathname+'?view=results';
  el.innerHTML=`<div class="panel">
    <h2>Results · ${esc(p.name)} · ${p.distance}m</h2>
    <div class="row">
      <div class="seg">
        <button class="${sortMode==='time'?'on':''}" onclick="setSort('time')">Total time</button>
        <button class="${sortMode==='gmt'?'on':''}" onclick="setSort('gmt')">GMT%</button>
      </div>
      <span style="flex:1"></span>
      <button class="btn small ghost editOnly" onclick="navigator.clipboard&&navigator.clipboard.writeText('${link}').then(()=>toast('View-only link copied'))">Copy link</button>
      <button class="btn small editOnly" onclick="exportPdf(db.activePieceId)">PDF</button>
    </div>
    ${resultsTableHtml(p)}
    <p class="hint" style="margin-top:12px">GMT% = scaled gold medal time ÷ time × 100 — higher is better. Updates live.</p>
  </div>`;
}

/* =====================================================
   Pieces (history) + PDF
   ===================================================== */
function renderPieces(){
  const el=document.getElementById('viewPieces');
  drawPieces(el);
  if(root) root.child('pieces').orderByChild('createdAt').limitToLast(100).once('value').then(s=>{
    const v=s.val()||{};
    Object.keys(v).forEach(k=>{ db.pieces[k]=Object.assign(db.pieces[k]||{}, v[k]); });
    overlayQueue('pieces'); persistDb();
    if(currentView==='Pieces') drawPieces(el);
  }).catch(()=>{});
}
function pieceStatus(p){
  const boats=boatsInOrder(p);
  if(!boats.length) return {label:'Empty', run:false, complete:false};
  const started=boats.filter(b=>b.startTs!=null).length;
  const finished=boats.filter(b=>b.startTs!=null&&b.finishTs!=null).length;
  if(started===0) return {label:'Not run yet', run:true, complete:false};
  if(finished>=boats.length) return {label:'Complete', run:false, complete:true};
  return {label:'In progress', run:false, complete:false};
}
function drawPieces(el){
  const ids=Object.keys(db.pieces).sort((a,b)=>(db.pieces[b].createdAt||0)-(db.pieces[a].createdAt||0));
  const rows=ids.map(id=>{
    const p=db.pieces[id];
    const n=boatsInOrder(p).length;
    const active=id===db.activePieceId;
    const st=pieceStatus(p);
    const stPill = st.label==='Not run yet' ? `<span class="pill" style="margin-left:6px">Not run yet</span>`
      : st.complete ? `<span class="pill ok" style="margin-left:6px">Complete</span>`
      : st.label==='In progress' ? `<span class="pill warn" style="margin-left:6px">In progress</span>` : '';
    // primary action: Run for unrun pieces, Results for anything with times
    const primary = st.run
      ? `<button class="btn small" onclick="runPiece('${id}')">Run</button>`
      : `<button class="btn small ghost" onclick="openPiece('${id}')">Results</button>`;
    const resume = (!st.run && !st.complete) ? `<button class="btn small ghost" onclick="runPiece('${id}')">Continue</button>` : '';
    return `<div class="pieceRow">
      <div style="flex:1;min-width:150px"><div class="nm">${esc(p.name)} ${active?'<span class="pill ok" style="margin-left:6px">Active</span>':''}${(active&&stPill)?' ':''}${stPill}</div>
      <div class="sub">${new Date(p.createdAt||0).toLocaleString('en-GB')} · ${p.distance}m · ${n} boat${n===1?'':'s'} · ${p.startMode==='mass'?'regatta start':'time trial'}${p.sessionId?' · testing':''}</div></div>
      ${primary}
      ${resume}
      <button class="btn small ghost" onclick="editPiece('${id}')">Edit</button>
      <button class="btn small ghost" onclick="exportPdf('${id}')">PDF</button>
      <button class="btn small danger" onclick="deletePiece('${id}')">Delete</button>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="panel"><h2>Saved pieces</h2>${rows||'<p class="hint">Nothing saved yet — create one from Setup.</p>'}</div>`;
}
function runPiece(id){
  fbSet('activePieceId', id);
  subscribeActivePiece();
  toast('Now active');
  showView('Start');
}
function editPiece(id){
  const p=db.pieces[id]; if(!p) return;
  draft = {
    name:p.name||'', distance:p.distance||2000, startMode:p.startMode||'staggered',
    editingId: id,
    boats: boatsInOrder(p).map(b=>({ ident:b.ident||'', category:b.category||'M1x', crew:Object.assign({},b.crew||{}), lane:b.lane||0, invId:b.invId||null, _id:b.id }))
  };
  showView('Setup');
}
function openPiece(id){
  fbSet('activePieceId', id);
  subscribeActivePiece();
  showView('Results');
}
function deletePiece(id){
  if(!confirm('Delete this piece and its times?')) return;
  fbSet('pieces/'+id, null);
  if(db.activePieceId===id){ fbSet('activePieceId', null); db.activePieceId=null; }
  renderPieces();
}
function exportPdf(id){
  const p=db.pieces[id]; if(!p){ toast('Piece not found'); return; }
  const {done,pending}=resultsData(p);
  const { jsPDF } = window.jspdf;
  const doc=new jsPDF();
  doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(14,40,65);
  doc.text('EUBC Timing — '+(p.name||'Piece'), 14, 18);
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(102,112,124);
  doc.text([ new Date(p.createdAt||0).toLocaleString('en-GB'),
    'Distance: '+p.distance+'m · Start: '+(p.startMode==='mass'?'regatta start':'time trial'),
    'Ranked by '+(sortMode==='gmt'?'GMT%':'total time')+' · GMT scaled linearly from 2k gold medal times' ], 14, 25);
  doc.autoTable({
    startY:38,
    head:[['#','Lane','Boat','Category','Crew','Time','/500m','GMT%']],
    body:done.map((b,i)=>[i+1, b.lane||'—', b.ident, catLabel(b.category), crewText(b), fmtElapsed(b.elapsed), splitPer500(b.elapsed, p.distance), b.pct!=null?b.pct.toFixed(2)+'%':'—']),
    styles:{font:'helvetica',fontSize:9,cellPadding:2.5},
    headStyles:{fillColor:[14,40,65],textColor:[255,255,255],fontStyle:'bold'},
    alternateRowStyles:{fillColor:[242,243,245]},
    columnStyles:{0:{cellWidth:8},1:{cellWidth:12,halign:'center'},5:{halign:'right'},6:{halign:'right'},7:{halign:'right'}}
  });
  if(pending.length){
    doc.setFontSize(9); doc.setTextColor(120);
    doc.text('No time recorded: '+pending.map(b=>b.ident+' ('+catLabel(b.category)+')').join(', '), 14, doc.lastAutoTable.finalY+8, {maxWidth:180});
  }
  doc.setFontSize(8); doc.setTextColor(150);
  doc.text('Generated '+new Date().toLocaleString('en-GB')+' · Edinburgh University Boat Club', 14, 290);
  doc.save((p.name||'piece').replace(/[^\w\-]+/g,'_')+'_results.pdf');
}

/* =====================================================
   Settings — GMTs
   ===================================================== */
function renderSettings(){
  const el=document.getElementById('viewSettings');
  const g=db.settings.gmts||{};
  const inv=inventory();
  const invIds=Object.keys(inv).sort((a,c)=>(inv[a].ident||'').localeCompare(inv[c].ident||''));
  const invRows = invIds.map(id=>`<div class="pieceRow">
      <div style="flex:1;min-width:120px"><div class="nm">${esc(inv[id].ident)}</div><div class="sub">${typeLabel(inv[id].type)}</div></div>
      <button class="btn small danger" onclick="deleteInvBoat('${id}')">Remove</button>
    </div>`).join('');
  el.innerHTML=`<div class="panel">
    <h2>Boat inventory</h2>
    <p class="hint" style="margin-bottom:12px">Your club's hulls, as a quick reference for identifying a boat on the water. When setting up a piece you can pick a boat from here to fill in its bow number. The type is just a label — the racing category (which drives GMT) is still chosen per boat in setup.</p>
    <div class="row" style="align-items:flex-end">
      <label class="fld" style="flex:1;min-width:150px">Bow number
        <input id="invIdent" placeholder="e.g. 401234 or Kelpie" oninput="window._invIdent=this.value">
      </label>
      <label class="fld" style="min-width:110px">Type
        <select id="invType" onchange="window._invType=this.value">
          ${BOAT_TYPES.map(bt=>`<option value="${bt.t}">${bt.label}</option>`).join('')}
        </select>
      </label>
      <button class="btn" onclick="addInvBoat()">Add boat</button>
    </div>
    ${invIds.length ? `<div style="margin-top:12px">
      <button class="btn ghost small" onclick="invListOpen=!invListOpen;renderSettings()">${invListOpen?'Hide':'Show'} boat list (${invIds.length})</button>
      ${invListOpen ? `<div style="margin-top:10px">${invRows}</div>` : ''}
    </div>` : '<p class="hint" style="margin-top:12px">No boats in the inventory yet.</p>'}
  </div>
  <div class="panel">
    <h2>Gold medal times (2k)</h2>
    <p class="hint" style="margin-bottom:12px">Enter as m:ss.00. For pieces that aren't 2000m, the GMT is scaled linearly to the piece distance.</p>
    <div class="gmtGrid">
      ${CATS.map(c=>`<label class="fld">${catLabel(c)}
        <input id="gmt_${c.replace(/[^\w]/g,'_')}" value="${fmtGmtSec(g[c])}" placeholder="m:ss.00" inputmode="decimal">
      </label>`).join('')}
    </div>
    <div class="row" style="margin-top:14px">
      <button class="btn" onclick="saveGmts()">Save GMTs</button>
      <button class="btn ghost" onclick="if(confirm('Reset all GMTs to world best defaults?')){fbSet('settings/gmts',{...DEFAULT_GMTS});toast('GMTs reset');}">Reset to defaults</button>
    </div>
  </div>
  <div class="panel">
    <h2>Timing sync</h2>
    <p class="hint">All timestamps use Firebase server time — times are stamped the instant a button is touched (pointer-down, not release). Current device offset: <strong>${serverOffset>=0?'+':''}${Math.round(serverOffset)}ms</strong>.
    Once calibrated, this device keeps stamping accurately even if it drops offline — taps queue locally and upload automatically when the connection returns.</p>
  </div>`;
  window._invIdent=''; window._invType=window._invType||BOAT_TYPES[0].t;
}
function addInvBoat(){
  const ident=(window._invIdent||'').trim();
  const type=window._invType||BOAT_TYPES[0].t;
  if(!ident){ toast('Enter a bow number'); return; }
  const inv=inventory();
  if(Object.values(inv).some(h=>(h.ident||'').toLowerCase()===ident.toLowerCase())){ toast('That bow number already exists'); return; }
  const id='h'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  invListOpen=true;
  fbSet('settings/boats/'+id, {ident, type});
  toast('Boat added');
}
function deleteInvBoat(id){
  if(!confirm('Remove this boat from the inventory?')) return;
  fbSet('settings/boats/'+id, null);
  toast('Boat removed');
}
function saveGmts(){
  const out={};
  let bad=null;
  CATS.forEach(c=>{
    const inp=document.getElementById('gmt_'+c.replace(/[^\w]/g,'_'));
    const v=parseTimeStr(inp.value);
    if(v==null){ bad=bad||catLabel(c); out[c]=(db.settings.gmts||{})[c]||DEFAULT_GMTS[c]; }
    else out[c]=v;
  });
  if(bad){ toast('Invalid time for '+bad+' — use m:ss.00'); return; }
  fbSet('settings/gmts', out);
  toast('GMTs saved');
}

/* =====================================================
   Boot
   ===================================================== */
const VIEWONLY = new URLSearchParams(location.search).get('view')==='results';
if(VIEWONLY){
  document.body.classList.add('viewonly');
  document.getElementById('viewResults').classList.remove('hidden');
  renderResults();
} else {
  showView('Home');
}
updateSyncPill();
window.addEventListener('online', flushQueue);
</script>
