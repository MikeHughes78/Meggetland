<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>EUBC Timing</title>
<style>
/* ============ EUBC design system — quiet macOS-style chrome ============ */
/* Corporate face: Swiss 721. Drop licensed woff2 files into a /fonts folder
   next to this file and uncomment to activate; Helvetica Neue is the native
   fallback on every Mac and is the same design lineage.
@font-face{font-family:'Swiss 721';src:url('fonts/Swiss721-Roman.woff2') format('woff2');font-weight:400}
@font-face{font-family:'Swiss 721';src:url('fonts/Swiss721-Medium.woff2') format('woff2');font-weight:500}
@font-face{font-family:'Swiss 721';src:url('fonts/Swiss721-Bold.woff2') format('woff2');font-weight:600}
*/
:root{
  --canvas:#f2f3f5;
  --panel:#ffffff;
  --hair:#dfe3e8;
  --hair-soft:#eceff2;
  --text:#1d2530;
  --sub:#66707c;
  --navy:#0E2841;
  --blade:#6bb7e0;
  --blade-deep:#1a6a9a;
  --blade-tint:#eef6fb;
  --green:#2fa35c;
  --green-deep:#1f7d44;
  --green-bg:#ecf8f0;
  --green-hair:#b9e2c6;
  --red:#d0453a;
  --red-bg:#fdf3f2;
  --red-hair:#eec4bf;
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
button,input,select{touch-action:manipulation;font-family:inherit}
html{background:var(--canvas)}
body{
  font-family:'Swiss 721','Helvetica Neue',Helvetica,Arial,sans-serif;
  background:var(--canvas);color:var(--text);
  font-size:13px;line-height:1.45;min-height:100vh;
  padding-bottom:calc(74px + env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:820px;margin:0 auto;padding:12px}

/* ============ header ============ */
header.bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--panel);border:1px solid var(--hair);border-radius:12px;
  padding:10px 14px;margin-bottom:12px;
  box-shadow:0 1px 2px rgba(16,24,40,.04);
}
.logo{height:30px;width:auto;display:block}
header.bar h1{font-size:1.02rem;font-weight:600;color:var(--navy);letter-spacing:-.01em}
header.bar h1 span{font-weight:500;color:var(--blade-deep)}
#masterClock{
  font-family:var(--mono);font-weight:600;font-variant-numeric:tabular-nums;
  font-size:1.1rem;letter-spacing:-.01em;color:var(--navy);margin-left:auto;
}
.pill{
  font-size:.68rem;font-weight:600;padding:3px 10px;border-radius:999px;
  border:1px solid var(--hair);background:var(--hair-soft);color:var(--sub);white-space:nowrap;
}
.pill.ok{color:var(--green-deep);border-color:var(--green-hair);background:var(--green-bg)}
.pill.warn{color:#9a6b12;border-color:#ecd9ae;background:#fbf4e3}
.pill.bad{color:var(--red);border-color:var(--red-hair);background:var(--red-bg)}

/* ============ nav — bottom bar on mobile, segmented on desktop ============ */
nav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  display:flex;justify-content:space-around;
  background:rgba(255,255,255,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--hair);
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
}
nav button{
  flex:1;max-width:104px;background:none;border:none;cursor:pointer;
  font-size:.72rem;font-weight:500;color:var(--sub);
  padding:8px 2px;border-radius:9px;transition:color .12s ease,background .12s ease;
}
nav button.active{color:var(--navy);font-weight:600;background:var(--hair-soft)}
nav button:active{opacity:.6}
@media(min-width:700px){
  body{padding-bottom:32px}
  nav{position:static;background:#e9ecef;border:none;border-radius:10px;
    display:inline-flex;justify-content:flex-start;padding:3px;margin-bottom:14px;backdrop-filter:none}
  nav button{flex:0 0 auto;max-width:none;font-size:.82rem;padding:7px 16px;border-radius:8px}
  nav button.active{background:#fff;box-shadow:0 1px 2px rgba(16,24,40,.1);border:1px solid var(--hair)}
}

/* ============ home screen ============ */
.home{display:flex;flex-direction:column;align-items:center;text-align:center;padding:28px 16px 20px}
.home img.crest{width:180px;max-width:52vw;height:auto;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(16,24,40,.12))}
.home .wordmark{font-size:1.5rem;font-weight:600;color:var(--navy);letter-spacing:-.01em;margin-bottom:2px}
.home .wordmark span{font-weight:500;color:var(--blade-deep)}
.home .tag{font-size:.85rem;color:var(--sub);margin-bottom:26px}
.home .actions{display:flex;flex-direction:column;gap:12px;width:100%;max-width:360px}
.homeBtn{
  display:flex;align-items:center;gap:14px;text-align:left;cursor:pointer;
  background:var(--panel);border:1px solid var(--hair);border-radius:14px;
  padding:18px 18px;box-shadow:0 1px 2px rgba(16,24,40,.04);
  transition:border-color .12s ease,transform .1s ease,box-shadow .12s ease;
}
.homeBtn:active{transform:scale(.985)}
.homeBtn.primary{background:var(--navy);border-color:var(--navy)}
.homeBtn .ic{
  flex:0 0 auto;width:42px;height:42px;border-radius:11px;display:grid;place-items:center;
  background:var(--blade-tint);color:var(--blade-deep);font-size:1.3rem;
}
.homeBtn.primary .ic{background:rgba(255,255,255,.14);color:#fff}
.homeBtn .tx{flex:1;min-width:0}
.homeBtn .tt{font-size:1rem;font-weight:600;color:var(--navy)}
.homeBtn.primary .tt{color:#fff}
.homeBtn .ds{font-size:.78rem;color:var(--sub);margin-top:1px}
.homeBtn.primary .ds{color:rgba(255,255,255,.72)}
.homeBtn .chev{color:var(--sub);font-size:1.1rem;flex:0 0 auto}
.homeBtn.primary .chev{color:rgba(255,255,255,.6)}
.home .resume{margin-top:22px;font-size:.82rem;color:var(--sub)}
.home .resume a{color:var(--blade-deep);font-weight:600;cursor:pointer;text-decoration:none}

/* ============ panels ============ */
.panel{
  background:var(--panel);border:1px solid var(--hair);border-radius:12px;
  padding:16px;margin-bottom:12px;box-shadow:0 1px 2px rgba(16,24,40,.04);
}
.panel h2{font-size:.95rem;font-weight:600;color:var(--navy);letter-spacing:-.01em;margin-bottom:10px}
.hint{font-size:.8rem;color:var(--sub);line-height:1.45}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
label.fld{display:flex;flex-direction:column;gap:4px;font-size:.72rem;font-weight:500;color:var(--sub)}
input,select{
  font-size:.95rem;color:var(--text);background:#fff;
  border:1px solid var(--hair);border-radius:8px;padding:9px 10px;outline:none;min-width:0;
}
input:focus,select:focus{border-color:var(--blade);box-shadow:0 0 0 3px rgba(107,183,224,.18)}
input[type=number]{width:104px}

.btn{
  font-weight:600;font-size:.85rem;cursor:pointer;
  border:1px solid var(--navy);border-radius:9px;padding:10px 16px;
  color:#fff;background:var(--navy);transition:opacity .12s ease,transform .1s ease;
}
.btn:active{transform:scale(.97);opacity:.9}
.btn.ghost{background:#fff;color:var(--text);border-color:var(--hair)}
.btn.danger{background:#fff;color:var(--red);border-color:var(--red-hair)}
.btn.small{padding:7px 12px;font-size:.78rem;border-radius:8px}

/* segmented control */
.seg{display:inline-flex;background:#e9ecef;border-radius:9px;padding:2px}
.seg button{border:none;background:none;cursor:pointer;font-size:.8rem;font-weight:500;color:var(--sub);padding:6px 14px;border-radius:7px}
.seg button.on{background:#fff;color:var(--navy);font-weight:600;box-shadow:0 1px 2px rgba(16,24,40,.1)}
.chip{font-size:.78rem;font-weight:500;padding:6px 12px;border-radius:999px;background:#fff;border:1px solid var(--hair);color:var(--sub);cursor:pointer}
.chip.on{background:var(--blade-tint);color:var(--blade-deep);border-color:var(--blade);font-weight:600}

/* ============ boat cards (setup) ============ */
.boatCard{background:#fff;border:1px solid var(--hair);border-radius:10px;padding:12px;margin-bottom:10px}
.boatCard .head{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px}
.crewGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px}

/* ============ timing buttons ============ */
.stampBtn{
  width:100%;display:flex;align-items:center;gap:12px;text-align:left;
  border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;min-height:74px;
  border:1px solid var(--red-hair);background:var(--red-bg);color:var(--text);
  position:relative;overflow:hidden;
  transition:background .15s ease,border-color .15s ease;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
}
.stampBtn .ident{
  font-family:var(--mono);font-weight:600;font-size:1.3rem;min-width:52px;color:var(--red);
  font-variant-numeric:tabular-nums;
}
.stampBtn .meta{flex:1;min-width:0}
.stampBtn .cat{font-weight:600;font-size:.9rem;color:var(--navy)}
.stampBtn .crew{font-size:.74rem;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stampBtn .time{font-family:var(--mono);font-weight:600;font-size:1.05rem;font-variant-numeric:tabular-nums;color:var(--red);text-align:right;line-height:1.25}
.stampBtn .sub{display:block;font-family:'Swiss 721','Helvetica Neue',Helvetica,sans-serif;font-size:.62rem;font-weight:500;color:var(--sub);margin-top:2px}
.stampBtn:active{transform:scale(.99)}
.stampBtn.done{border-color:var(--green-hair);background:var(--green-bg)}
.stampBtn.done .ident{color:var(--green-deep)}
.stampBtn.done .time{color:var(--green-deep)}
.stampBtn.waiting{opacity:.5;pointer-events:none;border-color:var(--hair);background:#fff}
.stampBtn.running{border-color:var(--green-hair);background:var(--green-bg)}
.stampBtn.running .ident{color:var(--green-deep)}
.stampBtn.running .time{color:var(--green-deep)}
.runTag{display:inline-flex;align-items:center;gap:5px;font-family:'Swiss 721','Helvetica Neue',Helvetica,sans-serif;font-size:.6rem;font-weight:600;color:var(--green-deep);letter-spacing:.02em}
.runDot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:runPulse 1.1s ease-in-out infinite}
@keyframes runPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
.stampBtn.flash{animation:stampFlash .5s ease-out}
@keyframes stampFlash{
  0%{background:#8fe0ac;border-color:var(--green);transform:scale(1.015)}
  100%{background:var(--green-bg);border-color:var(--green-hair);transform:scale(1)}
}
.stampBtn.holding{animation:holdShrink .6s ease-in forwards}
@keyframes holdShrink{0%{transform:scale(1)}100%{transform:scale(.965);background:var(--red-bg);border-color:var(--red)}}
.massBtn{
  width:100%;padding:26px 20px;border-radius:14px;margin-bottom:12px;cursor:pointer;
  border:1px solid var(--red-hair);background:var(--red-bg);color:var(--red);
  font-weight:600;font-size:1.25rem;position:relative;overflow:hidden;
  transition:background .15s ease,border-color .15s ease;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
}
.massBtn .sub{display:block;font-size:.68rem;font-weight:500;color:var(--sub);margin-top:4px}
.massBtn.done{border-color:var(--green-hair);background:var(--green-bg);color:var(--green-deep);font-size:1.05rem}
.massBtn.flash{animation:stampFlash .5s ease-out}
.massBtn.holding{animation:holdShrink .6s ease-in forwards}
.massBtn:active{transform:scale(.99)}

/* ============ results ============ */
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{font-weight:600;font-size:.7rem;color:var(--sub);text-align:left;padding:8px 6px;border-bottom:1px solid var(--hair)}
td{padding:9px 6px;border-bottom:1px solid var(--hair-soft);vertical-align:top}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
td.num{font-family:var(--mono);font-size:.83rem}
tr.rank1 td:first-child{color:#b3830a;font-weight:700}
tr.rank2 td:first-child{color:#7d8894;font-weight:700}
tr.rank3 td:first-child{color:#a5643a;font-weight:700}
.crewSmall{font-size:.72rem;color:var(--sub)}
.bigPct{font-family:var(--mono);font-weight:600;color:var(--blade-deep)}

/* ============ pieces & settings ============ */
.pieceRow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:11px 2px;border-bottom:1px solid var(--hair-soft)}
.pieceRow .nm{font-weight:600;color:var(--navy)}
.pieceRow .sub{font-size:.75rem;color:var(--sub)}
.gmtGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:10px}
.gmtGrid label.fld input{width:100%;font-family:var(--mono);font-size:.88rem}

.toastWrap{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:99;display:flex;flex-direction:column;gap:8px;align-items:center;width:max-content;max-width:92vw}
@media(min-width:700px){.toastWrap{bottom:24px}}
.toast{
  background:var(--navy);color:#fff;padding:9px 18px;border-radius:999px;
  font-size:.82rem;font-weight:500;box-shadow:0 4px 16px rgba(14,40,65,.3);
  animation:fadeUp .22s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hidden{display:none!important}
body.viewonly{padding-bottom:20px}
body.viewonly nav, body.viewonly #viewSetup, body.viewonly #viewStart, body.viewonly #viewFinish, body.viewonly #viewPieces, body.viewonly #viewSettings, body.viewonly .editOnly{display:none!important}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media(max-width:420px){
  header.bar{padding:9px 12px}
  header.bar h1{font-size:.92rem}
  #masterClock{font-size:.98rem}
  .logo{height:26px}
  .panel{padding:13px}
  .stampBtn .ident{font-size:1.15rem;min-width:44px}
  .stampBtn .time{font-size:.95rem}
  th,td{padding-left:4px;padding-right:4px}
}
</style>
</head>
<body>
<div class="wrap">

<header class="bar">
  <img src="eubc-logo.png" class="logo" alt="EUBC" onerror="this.style.display='none'" onclick="showView('Home')" style="cursor:pointer">
  <h1 onclick="showView('Home')" style="cursor:pointer">EUBC <span>Timing</span></h1>
  <span id="syncPill" class="pill warn">Connecting…</span>
  <div id="masterClock">--:--:--</div>
</header>

<nav id="nav">
  <button data-v="Setup">Setup</button>
  <button data-v="Start">Start</button>
  <button data-v="Finish">Finish</button>
  <button data-v="Results">Results</button>
  <button data-v="Pieces">Pieces</button>
  <button data-v="Settings">Settings</button>
</nav>

<div id="viewHome" class="view hidden"></div>
<div id="viewSetup" class="view"></div>
<div id="viewStart" class="view hidden"></div>
<div id="viewFinish" class="view hidden"></div>
<div id="viewResults" class="view hidden"></div>
<div id="viewPieces" class="view hidden"></div>
<div id="viewSettings" class="view hidden"></div>

</div>
<div class="toastWrap" id="toasts"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script>
/* =====================================================
   EUBC Timing — core: firebase, clock sync, offline queue
   ===================================================== */
const NODE = 'eubc-timing-v1';
/* Guarded init: if the Firebase SDK fails to load (opened with no signal),
   the app still runs fully from localStorage and syncs when it next loads online. */
let rtdb=null, root=null;
try{
  firebase.initializeApp({ databaseURL:'https://racetimer-40043-default-rtdb.europe-west1.firebasedatabase.app' });
  rtdb = firebase.database();
  root = rtdb.ref(NODE);
}catch(e){ console.warn('Firebase unavailable — running offline', e); }

const CATS = ['M1x','F1x','M2-','F2-','M2x','F2x','M4-','F4-','M4x','F4x','M4+','F4+','M8+','F8+'];
const DEFAULT_GMTS = { // 2k Gold Medal Times in seconds (editable in Settings)
  'M1x':390.74,'F1x':427.71,'M2-':368.50,'F2-':407.41,'M2x':359.72,'F2x':397.31,
  'M4-':337.86,'F4-':374.36,'M4x':332.26,'F4x':366.84,'M4+':358.96,'F4+':393.38,
  'M8+':318.68,'F8+':352.99
};
function catLabel(c){ return (c[0]==='M'?'Male ':'Female ')+c.slice(1); }
function positionsFor(c){
  const s=c.slice(1);
  if(s==='1x') return ['Sculler'];
  if(s==='2-'||s==='2x') return ['Stroke','Bow'];
  if(s==='4-'||s==='4x') return ['Stroke','3','2','Bow'];
  if(s==='4+') return ['Stroke','3','2','Bow','Cox'];
  return ['Cox','Stroke','7','6','5','4','3','2','Bow']; // 8+
}

/* ---------- local mirror + persistence ---------- */
const LS = { db:'eubcTimer.db', queue:'eubcTimer.queue', offset:'eubcTimer.offset', sort:'eubcTimer.sort' };
let db = { settings:{ gmts:{...DEFAULT_GMTS} }, activePieceId:null, pieces:{} };
try{ const c=JSON.parse(localStorage.getItem(LS.db)); if(c) db=Object.assign(db,c); }catch(e){}
if(!db.settings) db.settings={gmts:{...DEFAULT_GMTS}};
if(!db.settings.gmts) db.settings.gmts={...DEFAULT_GMTS};

let queue = [];
try{ queue = JSON.parse(localStorage.getItem(LS.queue)) || []; }catch(e){}

function persistDb(){ try{ localStorage.setItem(LS.db, JSON.stringify(db)); }catch(e){} }
function persistQueue(){ try{ localStorage.setItem(LS.queue, JSON.stringify(queue)); }catch(e){} }

function applyPath(obj, path, val){
  const segs = path.split('/');
  let o = obj;
  for(let i=0;i<segs.length-1;i++){
    if(typeof o[segs[i]]!=='object' || o[segs[i]]===null) o[segs[i]]={};
    o=o[segs[i]];
  }
  const last = segs[segs.length-1];
  if(val===null) delete o[last]; else o[last]=val;
}

/* every write: local first, then queue -> firebase */
function fbSet(path, val){
  applyPath(db, path, val);
  persistDb();
  queue.push({ path, val });
  persistQueue();
  flushQueue();
  updateSyncPill();
  renderCurrent();
}

let connected=false, flushing=false;
function flushQueue(){
  if(!root || !connected || flushing || !queue.length) return;
  flushing=true;
  const op = queue[0];
  root.child(op.path).set(op.val===undefined?null:op.val)
    .then(()=>{ queue.shift(); persistQueue(); flushing=false; updateSyncPill(); flushQueue(); })
    .catch(()=>{ flushing=false; updateSyncPill(); });
}

/* ---------- server clock sync ---------- */
let serverOffset = Number(localStorage.getItem(LS.offset)) || 0;
if(rtdb) rtdb.ref('.info/serverTimeOffset').on('value', s=>{
  const v = s.val();
  if(typeof v==='number'){ serverOffset=v; localStorage.setItem(LS.offset,String(v)); updateSyncPill(); }
});
if(rtdb) rtdb.ref('.info/connected').on('value', s=>{
  connected = s.val()===true;
  updateSyncPill();
  if(connected) flushQueue();
});
function nowMs(){ return Date.now() + serverOffset; }

function updateSyncPill(){
  const p = document.getElementById('syncPill');
  if(connected && !queue.length){ p.className='pill ok'; p.textContent='Live · synced'; }
  else if(connected){ p.className='pill warn'; p.textContent='Syncing · '+queue.length+' pending'; }
  else { p.className='pill bad'; p.textContent='Offline · '+queue.length+' queued'; }
}

/* ---------- remote listeners (remote wins, then replay pending ops) ---------- */
function overlayQueue(prefix){
  queue.forEach(op=>{ if(op.path===prefix || op.path.startsWith(prefix+'/') ) applyPath(db, op.path, op.val); });
}
if(root) root.child('settings/gmts').on('value', s=>{
  const v=s.val();
  if(v){ db.settings.gmts = Object.assign({...DEFAULT_GMTS}, v); overlayQueue('settings/gmts'); persistDb(); renderCurrent(); }
});
let pieceSub=null;
if(root) root.child('activePieceId').on('value', s=>{
  const id=s.val();
  if(id) { db.activePieceId=id; }
  overlayQueue('activePieceId');
  persistDb();
  subscribeActivePiece();
  renderCurrent();
});
function subscribeActivePiece(){
  if(!root) return;
  const id = db.activePieceId;
  if(pieceSub){ pieceSub.ref.off('value', pieceSub.fn); pieceSub=null; }
  if(!id) return;
  const ref = root.child('pieces/'+id);
  const fn = s=>{
    const v=s.val();
    if(v){ db.pieces[id]=v; overlayQueue('pieces/'+id); persistDb(); renderCurrent(); }
  };
  ref.on('value', fn);
  pieceSub={ref,fn};
}

/* ---------- audio: stopwatch beep, zero-lag ---------- */
let audioCtx=null;
function initAudio(){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});
    if(audioCtx.state==='suspended') audioCtx.resume();
  }catch(e){}
}
document.addEventListener('pointerdown', initAudio, {once:false, passive:true});
function beep(freq, dur, vol){
  try{
    if(!audioCtx) initAudio();
    if(!audioCtx) return;
    const t0=audioCtx.currentTime;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='square';
    o.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(vol, t0);
    g.gain.setValueAtTime(vol, t0+dur*0.7);
    g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t0); o.stop(t0+dur);
  }catch(e){}
}
function stampBeep(){ beep(1760, 0.08, 0.14); }   // sharp stopwatch blip
function clearBeep(){ beep(520, 0.1, 0.1); }      // low blip on clear
function buzz(ms){ if(navigator.vibrate) try{navigator.vibrate(ms);}catch(e){} }

/* ---------- helpers ---------- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtElapsed(ms){
  if(ms==null || isNaN(ms) || ms<0) return '—';
  const h = Math.round(ms/10);
  const m = Math.floor(h/6000), s = Math.floor((h%6000)/100), c = h%100;
  return m+':'+String(s).padStart(2,'0')+'.'+String(c).padStart(2,'0');
}
function fmtGmtSec(sec){
  if(sec==null||isNaN(sec)) return '';
  const h=Math.round(sec*100);
  const m=Math.floor(h/6000), s=Math.floor((h%6000)/100), c=h%100;
  return m+':'+String(s).padStart(2,'0')+'.'+String(c).padStart(2,'0');
}
function parseTimeStr(str){
  if(!str) return null;
  const m = String(str).trim().match(/^(\d+):([0-5]?\d)(?:\.(\d{1,2}))?$/);
  if(!m) return null;
  return parseInt(m[1],10)*60 + parseInt(m[2],10) + (m[3]? parseInt(m[3].padEnd(2,'0'),10)/100 : 0);
}
function fmtWallClock(ms){
  const d = new Date(ms);
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')+'.'+Math.floor(d.getMilliseconds()/100);
}
function toast(msg){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}
function activePiece(){ return db.activePieceId ? db.pieces[db.activePieceId] : null; }
function boatsInOrder(piece){
  if(!piece||!piece.boats) return [];
  const order = piece.order || Object.keys(piece.boats);
  return order.filter(id=>piece.boats[id]).map(id=>({id, ...piece.boats[id]}));
}
function crewText(b){
  const pos = positionsFor(b.category||'M1x');
  const crew = b.crew||{};
  return pos.map((p,i)=>{ const n=(crew[i]||'').trim(); return n? (pos.length>1? p+': '+n : n) : null; }).filter(Boolean).join(' · ');
}
function scaledGmtMs(cat, distance){
  const g = (db.settings.gmts||{})[cat];
  if(!g || !distance) return null;
  return g*1000 * (distance/2000);
}
function gmtPct(b, piece){
  if(b.startTs==null||b.finishTs==null) return null;
  const el = b.finishTs-b.startTs;
  const g = scaledGmtMs(b.category, piece.distance);
  if(!g || el<=0) return null;
  return g/el*100;
}

/* master clock */
setInterval(()=>{ document.getElementById('masterClock').textContent = fmtWallClock(nowMs()); }, 90);
</script>
<script>
/* =====================================================
   Views
   ===================================================== */
const VIEWS=['Home','Setup','Start','Finish','Results','Pieces','Settings'];
let currentView='Home';
let startTick=null, finishTick=null;
document.getElementById('nav').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  showView(b.dataset.v);
});
function showView(v){
  currentView=v;
  VIEWS.forEach(x=>{
    const el=document.getElementById('view'+x);
    el.classList.toggle('hidden', x!==v);
    if(x!==v) el.innerHTML='';
  });
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.v===v));
  // nav is a landing page — hide the tab bar on Home
  document.getElementById('nav').style.display = (v==='Home') ? 'none' : '';
  if(v!=='Start') clearInterval(startTick);
  if(v!=='Finish') clearInterval(finishTick);
  renderCurrent();
  window.scrollTo({top:0});
}
function renderCurrent(){
  if(VIEWONLY){ renderResults(); return; }
  ({Home:renderHome,Setup:renderSetup,Start:renderStart,Finish:renderFinish,Results:renderResults,Pieces:renderPieces,Settings:renderSettings})[currentView]();
}

/* =====================================================
   Home
   ===================================================== */
function renderHome(){
  const el=document.getElementById('viewHome');
  const p=activePiece();
  const resume = p ? `<div class="resume">Current piece: <a onclick="showView('Start')">${esc(p.name)}</a> · ${p.distance}m</div>` : '';
  el.innerHTML = `<div class="home">
    <img src="eubc-logo.png" class="crest" alt="Edinburgh University Boat Club" onerror="this.style.display='none'">
    <div class="wordmark">EUBC <span>Timing</span></div>
    <div class="tag">Edinburgh University Boat Club</div>
    <div class="actions">
      <div class="homeBtn primary" onclick="startNewPiece()">
        <div class="ic">＋</div>
        <div class="tx"><div class="tt">Start new piece</div><div class="ds">Set distance, boats and crews</div></div>
        <div class="chev">›</div>
      </div>
      <div class="homeBtn" onclick="showView('Pieces')">
        <div class="ic">≣</div>
        <div class="tx"><div class="tt">Open existing piece</div><div class="ds">Saved pieces, results and PDFs</div></div>
        <div class="chev">›</div>
      </div>
    </div>
    ${resume}
  </div>`;
}
function startNewPiece(){
  draft = newDraft();
  showView('Setup');
}

/* =====================================================
   Setup — draft piece
   ===================================================== */
let draft = null;
function newDraft(){
  return { name:'', distance:2000, startMode:'staggered', boats:[], editingId:null };
}
function loadActiveIntoDraft(){
  const p=activePiece(); if(!p) return;
  draft = {
    name:p.name||'', distance:p.distance||2000, startMode:p.startMode||'staggered',
    editingId: db.activePieceId,
    boats: boatsInOrder(p).map(b=>({ ident:b.ident||'', category:b.category||'M1x', crew:Object.assign({},b.crew||{}), _id:b.id }))
  };
  renderSetup();
}
function renderSetup(){
  if(!draft) draft=newDraft();
  const el=document.getElementById('viewSetup');
  const distChips=[250,500,1000,1500,2000,5000].map(d=>
    `<button class="chip ${draft.distance===d?'on':''}" onclick="setDist(${d})">${d}m</button>`).join('');
  el.innerHTML = `
  <div class="panel">
    <h2>${draft.editingId?'Edit piece':'New piece'}</h2>
    <div class="row">
      <label class="fld" style="flex:1;min-width:170px">Piece name
        <input id="pName" value="${esc(draft.name)}" placeholder="e.g. Tues AM · Piece 1" oninput="draft.name=this.value">
      </label>
      <label class="fld">Distance (m)
        <input id="pDist" type="number" min="50" step="50" value="${draft.distance}" oninput="draft.distance=Math.max(0,parseInt(this.value)||0);">
      </label>
    </div>
    <div class="row">${distChips}</div>
    <div class="row">
      <label class="fld" style="flex:1">Start type
        <select onchange="draft.startMode=this.value">
          <option value="staggered" ${draft.startMode==='staggered'?'selected':''}>Time trial — one after the other</option>
          <option value="mass" ${draft.startMode==='mass'?'selected':''}>Regatta start — all boats together</option>
        </select>
      </label>
      <button class="btn ghost" style="align-self:flex-end" onclick="addBoat()">+ Add boat</button>
    </div>
    <p class="hint">GMT% is scaled to the piece distance from the 2k gold medal times in Settings.</p>
  </div>
  <div id="boatList">${draft.boats.map((b,i)=>boatCardHtml(b,i)).join('')||'<p class="hint" style="padding:0 4px 12px">No boats yet — add your first boat above.</p>'}</div>
  <div class="panel">
    <div class="row" style="margin:0">
      <button class="btn" onclick="savePiece()">${draft.editingId?'Save changes':'Create piece & go to Start'}</button>
      <button class="btn ghost" onclick="draft=newDraft();renderSetup()">Clear</button>
      ${activePiece()&&!draft.editingId?'<button class="btn ghost" onclick="loadActiveIntoDraft()">Edit current piece</button>':''}
    </div>
  </div>`;
}
function setDist(d){ draft.distance=d; renderSetup(); }
function addBoat(){
  draft.boats.push({ ident:String(draft.boats.length+1), category:'M1x', crew:{} });
  renderSetup();
}
function boatCardHtml(b,i){
  const pos=positionsFor(b.category);
  return `<div class="boatCard">
    <div class="head">
      <label class="fld">Identifier
        <input style="width:84px" value="${esc(b.ident)}" oninput="draft.boats[${i}].ident=this.value">
      </label>
      <label class="fld" style="flex:1;min-width:150px">Category
        <select onchange="draft.boats[${i}].category=this.value;renderSetup()">
          ${CATS.map(c=>`<option value="${c}" ${b.category===c?'selected':''}>${catLabel(c)}</option>`).join('')}
        </select>
      </label>
      <button class="btn small danger" onclick="draft.boats.splice(${i},1);renderSetup()">Remove</button>
    </div>
    <div class="crewGrid">
      ${pos.map((p,j)=>`<label class="fld">${p}
        <input value="${esc(b.crew[j]||'')}" placeholder="Name" oninput="draft.boats[${i}].crew[${j}]=this.value">
      </label>`).join('')}
    </div>
  </div>`;
}
function savePiece(){
  if(!draft.boats.length){ toast('Add at least one boat'); return; }
  if(!draft.distance){ toast('Set a distance'); return; }
  const id = draft.editingId || ('p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6));
  const existing = draft.editingId ? (db.pieces[id]||{}) : {};
  const boats={}, order=[];
  draft.boats.forEach((b,i)=>{
    const bid = b._id || ('b'+i+'_'+Math.random().toString(36).slice(2,7));
    const prev = (existing.boats||{})[bid]||{};
    const crew={}; positionsFor(b.category).forEach((p,j)=>{ if((b.crew[j]||'').trim()) crew[j]=b.crew[j].trim(); });
    boats[bid]={ ident:(b.ident||'').trim()||String(i+1), category:b.category, crew,
                 startTs:prev.startTs!=null?prev.startTs:null, finishTs:prev.finishTs!=null?prev.finishTs:null };
    order.push(bid);
  });
  const piece={ name:(draft.name||'').trim()||('Piece '+new Date().toLocaleDateString('en-GB')),
    distance:draft.distance, startMode:draft.startMode,
    createdAt: existing.createdAt || nowMs(), boats, order };
  const wasEdit=!!draft.editingId;
  fbSet('pieces/'+id, piece);
  fbSet('activePieceId', id);
  subscribeActivePiece();
  draft=newDraft();
  toast(wasEdit?'Piece updated':'Piece created');
  showView('Start');
}

/* =====================================================
   Stamp on pointerdown (fastest possible), hold to clear
   ===================================================== */
function stampDown(ev, pieceId, boatId, field){
  const t = nowMs();               // capture the instant of touch, before anything else
  stampBeep(); buzz(15);
  fbSet('pieces/'+pieceId+'/boats/'+boatId+'/'+field, t);
  const btn=document.querySelector(`.stampBtn[data-bid="${boatId}"]`);
  if(btn) btn.classList.add('flash');
}
let lpTimer=null;
function lpStart(ev, pieceId, boatId, field){
  const btn=ev.currentTarget;
  btn.classList.add('holding');
  lpTimer=setTimeout(()=>{
    btn.classList.remove('holding');
    fbSet('pieces/'+pieceId+'/boats/'+boatId+'/'+field, null);
    clearBeep(); buzz(30);
    toast((field==='startTs'?'Start':'Finish')+' time cleared');
  },600);
}
function lpEnd(ev){
  clearTimeout(lpTimer);
  ev.currentTarget.classList.remove('holding');
}

/* =====================================================
   Start
   ===================================================== */
function renderStart(){
  const el=document.getElementById('viewStart');
  const p=activePiece();
  if(!p){ el.innerHTML='<div class="panel"><h2>Start</h2><p class="hint">No active piece. Create one in Setup.</p></div>'; return; }
  const id=db.activePieceId, boats=boatsInOrder(p);
  let inner='';
  if(p.startMode==='mass'){
    const allStarted = boats.every(b=>b.startTs!=null);
    inner += allStarted
      ? `<button class="massBtn done" data-bid="__mass" onpointerdown="lpMassClear(event,'${id}')" onpointerup="lpEnd(event)" onpointercancel="lpEnd(event)" onpointerleave="lpEnd(event)" oncontextmenu="return false"><span class="runTag"><span class="runDot"></span>RUNNING</span> · <span data-runlive="${boats[0].startTs}">${fmtElapsed(nowMs()-boats[0].startTs)}</span><span class="sub">Hold to clear all starts</span></button>`
      : `<button class="massBtn" data-bid="__mass" onpointerdown="massStart(event,'${id}')" oncontextmenu="return false">Start all<span class="sub">One tap — same synced time for every boat</span></button>`;
  }
  inner += boats.map(b=>{
    const done=b.startTs!=null;
    return done
      ? `<button class="stampBtn running" data-bid="${b.id}" onpointerdown="lpStart(event,'${id}','${b.id}','startTs')" onpointerup="lpEnd(event)" onpointercancel="lpEnd(event)" onpointerleave="lpEnd(event)" oncontextmenu="return false">
          <span class="ident">${esc(b.ident)}</span>
          <span class="meta"><div class="cat">${catLabel(b.category)}</div><div class="crew">${esc(crewText(b))||'&nbsp;'}</div></span>
          <span class="time"><span class="runTag"><span class="runDot"></span>RUNNING</span><br><span data-runlive="${b.startTs}">${fmtElapsed(nowMs()-b.startTs)}</span><span class="sub">Hold to clear</span></span>
        </button>`
      : `<button class="stampBtn" data-bid="${b.id}" onpointerdown="stampDown(event,'${id}','${b.id}','startTs')" oncontextmenu="return false">
          <span class="ident">${esc(b.ident)}</span>
          <span class="meta"><div class="cat">${catLabel(b.category)}</div><div class="crew">${esc(crewText(b))||'&nbsp;'}</div></span>
          <span class="time">Tap to start</span>
        </button>`;
  }).join('');
  el.innerHTML = `<div class="panel"><h2>Start · ${esc(p.name)} · ${p.distance}m</h2>
    <p class="hint" style="margin-bottom:12px">${p.startMode==='mass'?'Regatta start — one tap starts every boat on the same server-synced time.':'Time trial — tap each boat the instant it crosses the start.'}</p>
    ${inner}</div>`;
  clearInterval(startTick);
  if(boats.some(b=>b.startTs!=null) && currentView==='Start'){
    startTick=setInterval(()=>{
      document.querySelectorAll('#viewStart [data-runlive]').forEach(s=>{ s.textContent=fmtElapsed(nowMs()-Number(s.dataset.runlive)); });
    },50);
  }
}

function massStart(ev,id){
  const t = nowMs();
  const p=db.pieces[id]; if(!p) return;
  stampBeep(); buzz(20);
  boatsInOrder(p).forEach(b=>{ if(b.startTs==null) fbSet('pieces/'+id+'/boats/'+b.id+'/startTs', t); });
  const btn=document.querySelector(`.massBtn[data-bid="__mass"]`);
  if(btn) btn.classList.add('flash');
  toast('All boats started');
}
function lpMassClear(ev,id){
  const btn=ev.currentTarget;
  btn.classList.add('holding');
  lpTimer=setTimeout(()=>{
    btn.classList.remove('holding');
    const p=db.pieces[id];
    boatsInOrder(p).forEach(b=>fbSet('pieces/'+id+'/boats/'+b.id+'/startTs', null));
    clearBeep(); buzz(30);
    toast('All start times cleared');
  },600);
}

/* =====================================================
   Finish
   ===================================================== */
function renderFinish(){
  const el=document.getElementById('viewFinish');
  const p=activePiece();
  if(!p){ el.innerHTML='<div class="panel"><h2>Finish</h2><p class="hint">No active piece. Create one in Setup.</p></div>'; return; }
  const id=db.activePieceId, boats=boatsInOrder(p);
  const onWater = boats.filter(b=>b.startTs!=null && b.finishTs==null);
  const finished = boats.filter(b=>b.finishTs!=null && b.startTs!=null);
  const notStarted = boats.filter(b=>b.startTs==null);
  const btn = b=>{
    const running = b.startTs!=null && b.finishTs==null;
    const done = b.finishTs!=null;
    if(done) return `<button class="stampBtn done" data-bid="${b.id}" onpointerdown="lpStart(event,'${id}','${b.id}','finishTs')" onpointerup="lpEnd(event)" onpointercancel="lpEnd(event)" onpointerleave="lpEnd(event)" oncontextmenu="return false">
        <span class="ident">${esc(b.ident)}</span>
        <span class="meta"><div class="cat">${catLabel(b.category)}</div><div class="crew">${esc(crewText(b))||'&nbsp;'}</div></span>
        <span class="time">${fmtElapsed(b.finishTs-b.startTs)}<span class="sub">Hold to clear</span></span>
      </button>`;
    if(running) return `<button class="stampBtn" data-bid="${b.id}" onpointerdown="stampDown(event,'${id}','${b.id}','finishTs')" oncontextmenu="return false">
        <span class="ident">${esc(b.ident)}</span>
        <span class="meta"><div class="cat">${catLabel(b.category)}</div><div class="crew">${esc(crewText(b))||'&nbsp;'}</div></span>
        <span class="time"><span data-live="${b.startTs}">${fmtElapsed(nowMs()-b.startTs)}</span><span class="sub">Tap at the line</span></span>
      </button>`;
    return `<button class="stampBtn waiting" data-bid="${b.id}">
        <span class="ident">${esc(b.ident)}</span>
        <span class="meta"><div class="cat">${catLabel(b.category)}</div><div class="crew">${esc(crewText(b))||'&nbsp;'}</div></span>
        <span class="time">Not started</span>
      </button>`;
  };
  el.innerHTML = `<div class="panel"><h2>Finish · ${esc(p.name)} · ${p.distance}m</h2>
    <p class="hint" style="margin-bottom:12px">Tap the bow number the instant it crosses the line.</p>
    ${onWater.map(btn).join('')||(finished.length?'':'<p class="hint">No boats on the water yet.</p>')}
    ${finished.length?'<h2 style="margin-top:14px">Finished</h2>'+finished.map(btn).join(''):''}
    ${notStarted.length?'<h2 style="margin-top:14px">Waiting to start</h2>'+notStarted.map(btn).join(''):''}
  </div>`;
  clearInterval(finishTick);
  if(onWater.length && currentView==='Finish'){
    finishTick=setInterval(()=>{
      document.querySelectorAll('[data-live]').forEach(s=>{ s.textContent=fmtElapsed(nowMs()-Number(s.dataset.live)); });
    },50);
  }
}

/* =====================================================
   Results (+ view-only mode)
   ===================================================== */
let sortMode = localStorage.getItem(LS.sort)||'time';
function setSort(m){ sortMode=m; localStorage.setItem(LS.sort,m); renderResults(); }
function resultsData(piece){
  const boats=boatsInOrder(piece);
  const done=boats.filter(b=>b.startTs!=null&&b.finishTs!=null)
    .map(b=>({...b, elapsed:b.finishTs-b.startTs, pct:gmtPct(b,piece)}));
  done.sort((a,b)=> sortMode==='gmt'
    ? ((b.pct??-1)-(a.pct??-1))
    : (a.elapsed-b.elapsed));
  const pending=boats.filter(b=>!(b.startTs!=null&&b.finishTs!=null));
  return {done,pending};
}
function resultsTableHtml(piece){
  const {done,pending}=resultsData(piece);
  const rows=done.map((b,i)=>`<tr class="rank${i+1}">
    <td>${i+1}</td>
    <td><strong>${esc(b.ident)}</strong> · ${catLabel(b.category)}<div class="crewSmall">${esc(crewText(b))}</div></td>
    <td class="num">${fmtElapsed(b.elapsed)}</td>
    <td class="num"><span class="bigPct">${b.pct!=null?b.pct.toFixed(2)+'%':'—'}</span></td>
  </tr>`).join('');
  const pend=pending.length?`<p class="hint" style="margin-top:10px">Still out: ${pending.map(b=>esc(b.ident)).join(', ')}</p>`:'';
  return `<table><thead><tr><th>#</th><th>Boat</th><th class="num">Time</th><th class="num">GMT%</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="4" class="hint">No finished boats yet.</td></tr>'}</tbody></table>${pend}`;
}
function renderResults(){
  const el=document.getElementById('viewResults');
  const p=activePiece();
  if(VIEWONLY) el.classList.remove('hidden');
  if(!p){ el.innerHTML='<div class="panel"><h2>Results</h2><p class="hint">No active piece yet.</p></div>'; return; }
  const link = location.origin+location.pathname+'?view=results';
  el.innerHTML=`<div class="panel">
    <h2>Results · ${esc(p.name)} · ${p.distance}m</h2>
    <div class="row">
      <div class="seg">
        <button class="${sortMode==='time'?'on':''}" onclick="setSort('time')">Total time</button>
        <button class="${sortMode==='gmt'?'on':''}" onclick="setSort('gmt')">GMT%</button>
      </div>
      <span style="flex:1"></span>
      <button class="btn small ghost editOnly" onclick="navigator.clipboard&&navigator.clipboard.writeText('${link}').then(()=>toast('View-only link copied'))">Copy link</button>
      <button class="btn small editOnly" onclick="exportPdf(db.activePieceId)">PDF</button>
    </div>
    ${resultsTableHtml(p)}
    <p class="hint" style="margin-top:12px">GMT% = scaled gold medal time ÷ time × 100 — higher is better. Updates live.</p>
  </div>`;
}

/* =====================================================
   Pieces (history) + PDF
   ===================================================== */
function renderPieces(){
  const el=document.getElementById('viewPieces');
  drawPieces(el);
  if(root) root.child('pieces').orderByChild('createdAt').limitToLast(100).once('value').then(s=>{
    const v=s.val()||{};
    Object.keys(v).forEach(k=>{ db.pieces[k]=Object.assign(db.pieces[k]||{}, v[k]); });
    overlayQueue('pieces'); persistDb();
    if(currentView==='Pieces') drawPieces(el);
  }).catch(()=>{});
}
function drawPieces(el){
  const ids=Object.keys(db.pieces).sort((a,b)=>(db.pieces[b].createdAt||0)-(db.pieces[a].createdAt||0));
  const rows=ids.map(id=>{
    const p=db.pieces[id];
    const n=boatsInOrder(p).length;
    const active=id===db.activePieceId;
    return `<div class="pieceRow">
      <div style="flex:1;min-width:150px"><div class="nm">${esc(p.name)} ${active?'<span class="pill ok" style="margin-left:6px">Active</span>':''}</div>
      <div class="sub">${new Date(p.createdAt||0).toLocaleString('en-GB')} · ${p.distance}m · ${n} boat${n===1?'':'s'} · ${p.startMode==='mass'?'regatta start':'time trial'}</div></div>
      <button class="btn small ghost" onclick="openPiece('${id}')">Open</button>
      <button class="btn small ghost" onclick="exportPdf('${id}')">PDF</button>
      <button class="btn small danger" onclick="deletePiece('${id}')">Delete</button>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="panel"><h2>Saved pieces</h2>${rows||'<p class="hint">Nothing saved yet.</p>'}</div>`;
}
function openPiece(id){
  fbSet('activePieceId', id);
  subscribeActivePiece();
  showView('Results');
}
function deletePiece(id){
  if(!confirm('Delete this piece and its times?')) return;
  fbSet('pieces/'+id, null);
  if(db.activePieceId===id){ fbSet('activePieceId', null); db.activePieceId=null; }
  renderPieces();
}
function exportPdf(id){
  const p=db.pieces[id]; if(!p){ toast('Piece not found'); return; }
  const {done,pending}=resultsData(p);
  const { jsPDF } = window.jspdf;
  const doc=new jsPDF();
  doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(14,40,65);
  doc.text('EUBC Timing — '+(p.name||'Piece'), 14, 18);
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(102,112,124);
  doc.text([ new Date(p.createdAt||0).toLocaleString('en-GB'),
    'Distance: '+p.distance+'m · Start: '+(p.startMode==='mass'?'regatta start':'time trial'),
    'Ranked by '+(sortMode==='gmt'?'GMT%':'total time')+' · GMT scaled linearly from 2k gold medal times' ], 14, 25);
  doc.autoTable({
    startY:38,
    head:[['#','Boat','Category','Crew','Time','GMT%']],
    body:done.map((b,i)=>[i+1, b.ident, catLabel(b.category), crewText(b), fmtElapsed(b.elapsed), b.pct!=null?b.pct.toFixed(2)+'%':'—']),
    styles:{font:'helvetica',fontSize:9,cellPadding:2.5},
    headStyles:{fillColor:[14,40,65],textColor:[255,255,255],fontStyle:'bold'},
    alternateRowStyles:{fillColor:[242,243,245]},
    columnStyles:{0:{cellWidth:8},4:{halign:'right'},5:{halign:'right'}}
  });
  if(pending.length){
    doc.setFontSize(9); doc.setTextColor(120);
    doc.text('No time recorded: '+pending.map(b=>b.ident+' ('+catLabel(b.category)+')').join(', '), 14, doc.lastAutoTable.finalY+8, {maxWidth:180});
  }
  doc.setFontSize(8); doc.setTextColor(150);
  doc.text('Generated '+new Date().toLocaleString('en-GB')+' · Edinburgh University Boat Club', 14, 290);
  doc.save((p.name||'piece').replace(/[^\w\-]+/g,'_')+'_results.pdf');
}

/* =====================================================
   Settings — GMTs
   ===================================================== */
function renderSettings(){
  const el=document.getElementById('viewSettings');
  const g=db.settings.gmts||{};
  el.innerHTML=`<div class="panel">
    <h2>Gold medal times (2k)</h2>
    <p class="hint" style="margin-bottom:12px">Enter as m:ss.00. For pieces that aren't 2000m, the GMT is scaled linearly to the piece distance.</p>
    <div class="gmtGrid">
      ${CATS.map(c=>`<label class="fld">${catLabel(c)}
        <input id="gmt_${c.replace(/[^\w]/g,'_')}" value="${fmtGmtSec(g[c])}" placeholder="m:ss.00" inputmode="decimal">
      </label>`).join('')}
    </div>
    <div class="row" style="margin-top:14px">
      <button class="btn" onclick="saveGmts()">Save GMTs</button>
      <button class="btn ghost" onclick="if(confirm('Reset all GMTs to world best defaults?')){fbSet('settings/gmts',{...DEFAULT_GMTS});toast('GMTs reset');}">Reset to defaults</button>
    </div>
  </div>
  <div class="panel">
    <h2>Timing sync</h2>
    <p class="hint">All timestamps use Firebase server time — times are stamped the instant a button is touched (pointer-down, not release). Current device offset: <strong>${serverOffset>=0?'+':''}${Math.round(serverOffset)}ms</strong>.
    Once calibrated, this device keeps stamping accurately even if it drops offline — taps queue locally and upload automatically when the connection returns.</p>
  </div>`;
}
function saveGmts(){
  const out={};
  let bad=null;
  CATS.forEach(c=>{
    const inp=document.getElementById('gmt_'+c.replace(/[^\w]/g,'_'));
    const v=parseTimeStr(inp.value);
    if(v==null){ bad=bad||catLabel(c); out[c]=(db.settings.gmts||{})[c]||DEFAULT_GMTS[c]; }
    else out[c]=v;
  });
  if(bad){ toast('Invalid time for '+bad+' — use m:ss.00'); return; }
  fbSet('settings/gmts', out);
  toast('GMTs saved');
}

/* =====================================================
   Boot
   ===================================================== */
const VIEWONLY = new URLSearchParams(location.search).get('view')==='results';
if(VIEWONLY){
  document.body.classList.add('viewonly');
  document.getElementById('viewResults').classList.remove('hidden');
  renderResults();
} else {
  showView('Home');
}
updateSyncPill();
window.addEventListener('online', flushQueue);
</script>
